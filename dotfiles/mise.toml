[settings]
# Relative to this file's directory (config_root), so this works unmodified from any
# checkout location: a plain git clone, the Nix store copy NixOS activation applies from,
# or a WSL image. Source resolution for entries below (when `source` is omitted) mirrors
# the home-relative target path under this root, e.g. target "~/.zshenv" -> "./.zshenv".
dotfiles.root = "."

[dotfiles]
# Convenience pointer, mirrors chezmoi's old `symlink_dot_dotfiles.tmpl`. Points at the
# live source tree (a Nix store path on NixOS) — dangles across store-path GC between
# activations, same pre-existing risk chezmoi's version already had.
"~/.dotfiles" = { mode = "symlink", source = "." }

"~/.tmux.conf" = { mode = "copy" }
"~/.vimrc" = { mode = "copy" }
"~/.zshenv" = { mode = "copy" }
"~/.config/.bunfig.toml" = { mode = "copy" }
"~/.config/git/ignore" = { mode = "copy" }
"~/.config/nvim" = { mode = "copy" }
"~/.local/bin" = { mode = "copy" }
"~/.pi/agent" = { mode = "copy" }

# Agent skills: source lives in `skills/` (this repo's canonical copy); all three agent
# tools read from their own location, so each gets its own direct entry rather than
# chezmoi's old include-wrapper-per-location indirection.
"~/.agents/skills" = { mode = "copy", source = "skills" }
"~/.claude/skills" = { mode = "copy", source = "skills" }
"~/.gemini/config/skills" = { mode = "copy", source = "skills" }
