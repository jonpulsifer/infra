name: dotfiles
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install chezmoi
        run: mkdir -p ~/.local/bin && curl -fsSL https://get.chezmoi.io | sh -s -- -b ~/.local/bin
      - name: Chezmoi dry-run
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.local/share && ln -sfn "${{ github.workspace }}" ~/.local/share/chezmoi
          chezmoi apply --dry-run
      - name: Shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck dot_local/bin/executable_yeet dot_local/bin/executable_sssh .chezmoiscripts/run_once_install-mise.sh
