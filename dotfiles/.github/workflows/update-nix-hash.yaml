name: update-nix-hash
on:
  pull_request:
    paths:
      - pkgs/moonpay-cli.nix

jobs:
  update-moonpay-cli:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'renovate/') && contains(github.event.pull_request.title, 'moonpay')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update MoonPay CLI hashes
        run: nix run .#update-moonpay-cli --accept-flake-config

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet pkgs/moonpay-cli.nix pkgs/moonpay-cli-package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated hashes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/moonpay-cli.nix pkgs/moonpay-cli-package-lock.json
          git commit -m "fix(nix): update MoonPay CLI hashes"
          git push
