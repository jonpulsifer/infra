[env]
_.file = '.env'

[tools]
1password-cli = "latest"
age = "latest"
bat = "latest"
cilium-cli = "latest"
delta = "latest"
eza = "latest"
flux2 = "latest"
fzf = "latest"
gcloud = "latest"
"github:tronbyt/pixlet" = "v0.53.1"
go = "latest"
helm = "latest"
k9s = "latest"
kubectl = "latest"
kustomize = "latest"
shellcheck = "latest"
shfmt = "latest"
sops = "latest"
terraform = "latest"
terraform-docs = "latest"
vim = "latest"

[tasks.devshell]
description = "Enter the Nix dev shell"
run = "nix develop"

[tasks.fmt]
description = "Format Nix + Terraform"
run = [
  "nix develop -c nix fmt",
  "terraform fmt -recursive",
]

[tasks."nix:fmt"]
description = "Format Nix files"
run = "nix develop -c nix fmt"

[tasks."tf:fmt"]
description = "Format Terraform files"
run = "terraform fmt -recursive"

[tasks."tf:init"]
description = "Initialize Terraform modules without backends"
run = [
  "bash -lc 'for d in terraform/argo terraform/network/cloudflare terraform/network/tailscale terraform/network/unifi/folly terraform/network/unifi/offsite terraform/vault terraform/google-workspace terraform/gcp/organization terraform/gcp/projects/* clusters/folly/bootstrap; do [ -d \"$d\" ] || continue; echo \"==> terraform init -backend=false $d\"; terraform -chdir=\"$d\" init -backend=false -input=false; done'",
]

[tasks."tf:validate"]
description = "Validate Terraform modules"
depends = ["tf:init"]
run = [
  "bash -lc 'for d in terraform/argo terraform/network/cloudflare terraform/network/tailscale terraform/network/unifi/folly terraform/network/unifi/offsite terraform/vault terraform/google-workspace terraform/gcp/organization terraform/gcp/projects/* clusters/folly/bootstrap; do [ -d \"$d\" ] || continue; echo \"==> terraform validate $d\"; terraform -chdir=\"$d\" validate; done'",
]

[tasks."tf:docs"]
description = "Regenerate terraform-docs READMEs (inject) for every module with TF_DOCS markers"
run = [
  "bash -lc 'grep -rl BEGIN_TF_DOCS . --include=README.md | xargs -r -n1 dirname | sort -u | while read -r d; do echo \"==> $d\"; terraform-docs markdown table --output-file README.md --output-mode inject \"$d\" >/dev/null; done'",
]

[tasks."tf:plan"]
description = "Run Terraform plan for one module (set TF_DIR)"
run = [
  "bash -lc 'if [ -z \"$TF_DIR\" ]; then echo \"Set TF_DIR, e.g. TF_DIR=unifi mise run tf:plan\"; exit 1; fi; terraform -chdir=\"$TF_DIR\" init -input=false && terraform -chdir=\"$TF_DIR\" plan'",
]

# helper: find bash/sh scripts (excludes python, etc.)
[tasks._scripts]
description = "List shell scripts in this repo"
hide = true
dir = "dotfiles"
run = """
grep -rl '^#!/usr/bin/env bash' .local/bin/* 2>/dev/null
"""

[tasks.format]
description = "Format shell scripts with shfmt"
dir = "dotfiles"
run = """
mise run _scripts | xargs shfmt -w -i 2 -ci -bn
"""

[tasks."format:check"]
description = "Check shell script formatting (no writes)"
dir = "dotfiles"
run = """
mise run _scripts | xargs shfmt -d -i 2 -ci -bn
"""

[tasks.lint]
description = "Lint shell scripts with shellcheck"
dir = "dotfiles"
run = """
mise run _scripts | xargs shellcheck
"""

[tasks.check]
description = "Run format check and lint"
dir = "dotfiles"
depends = ["format:check", "lint"]

[tasks.diff]
description = "Show mise dotfiles status"
dir = "dotfiles"
run = "mise dotfiles status"

[tasks.dry-run]
description = "Dry-run mise dotfiles apply"
dir = "dotfiles"
run = "mise dotfiles apply --dry-run"
