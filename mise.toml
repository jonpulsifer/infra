[env]
_.file = '.env'

[tools]
1password-cli = "latest"
age = "latest"
bat = "latest"
cilium-cli = "latest"
conftest = "latest"
delta = "latest"
eza = "latest"
flux2 = "latest"
fzf = "latest"
gcloud = "latest"
"github:tronbyt/pixlet" = "v0.53.1"
go = "latest"
helm = "latest"
k9s = "latest"
kubectl = "latest"
kustomize = "latest"
shellcheck = "latest"
shfmt = "latest"
sops = "latest"
# tofu is the apply-path binary (Atlantis runs ATLANTIS_DEFAULT_TF_DISTRIBUTION=opentofu);
# terraform stays installed for anything not yet migrated.
opentofu = "latest"
terraform = "latest"
terraform-docs = "latest"
vim = "latest"

[tasks.devshell]
description = "Enter the Nix dev shell"
run = "nix develop"

[tasks.fmt]
description = "Format Nix + Terraform"
run = [
  "nix develop -c nix fmt",
  "tofu fmt -recursive",
]

[tasks."nix:fmt"]
description = "Format Nix files"
run = "nix develop -c nix fmt"

[tasks."tf:fmt"]
description = "Format Terraform files"
run = "tofu fmt -recursive"

[tasks."validation-impact:test"]
description = "Test validation-impact routing"
run = "bash .github/scripts/validation-impact_test.sh"

[tasks."k8s:render-apps"]
description = "Render shared folly and offsite app overlays"
run = "bash .github/scripts/render-cluster-apps.sh"

[tasks."tf:init"]
description = "Initialize Terraform modules without backends"
run = [
  "bash -lc 'while IFS= read -r d; do echo \"==> tofu init -backend=false $d\"; tofu -chdir=\"$d\" init -backend=false -input=false; done < <(.github/scripts/validation-impact.sh terraform-roots)'",
]

[tasks."tf:validate"]
description = "Validate Terraform modules"
depends = ["tf:init"]
run = [
  "bash -lc 'while IFS= read -r d; do echo \"==> tofu validate $d\"; tofu -chdir=\"$d\" validate; done < <(.github/scripts/validation-impact.sh terraform-roots)'",
]

[tasks."tf:docs"]
description = "Regenerate terraform-docs READMEs (inject) for every module with TF_DOCS markers"
run = [
  "bash -lc 'grep -rl BEGIN_TF_DOCS . --include=README.md | xargs -r -n1 dirname | sort -u | while read -r d; do echo \"==> $d\"; terraform-docs markdown table --output-file README.md --output-mode inject \"$d\" >/dev/null; done'",
]

[tasks."nix:check"]
description = "Evaluate the whole flake (every host); slow"
run = "nix flake check"

[tasks."nix:build"]
description = "Build one host's system closure without deploying (set HOST)"
run = [
  "bash -lc 'if [ -z \"${HOST:-}\" ]; then echo \"Set HOST, e.g. HOST=optiplex mise run nix:build\"; exit 1; fi; nix build \".#nixosConfigurations.$HOST.config.system.build.toplevel\" --no-link --print-out-paths'",
]

[tasks."ts:check"]
description = "Typecheck and lint the Bun/Turborepo workspace"
run = [
  "bun run typecheck",
  "bun run lint",
]

[tasks."docs:build"]
description = "Build the Logseq wiki with the first-party Bun SSG"
run = "bun run --cwd apps/wiki build"

[tasks."docs:check"]
description = "Docs contract: wikilinks resolve, referenced paths exist, no archaeology"
run = "bash .github/scripts/docs-contract.sh"

[tasks."tf:plan"]
description = "Run Terraform plan for one module (set TF_DIR)"
run = [
  "bash -lc 'if [ -z \"$TF_DIR\" ]; then echo \"Set TF_DIR, e.g. TF_DIR=unifi mise run tf:plan\"; exit 1; fi; tofu -chdir=\"$TF_DIR\" init -input=false && tofu -chdir=\"$TF_DIR\" plan'",
]

# helper: find bash/sh scripts (excludes python, etc.)
[tasks._scripts]
description = "List shell scripts in this repo"
hide = true
dir = "dotfiles"
run = """
grep -rl '^#!/usr/bin/env bash' .local/bin/* 2>/dev/null
"""

[tasks.format]
description = "Format shell scripts with shfmt"
dir = "dotfiles"
run = """
mise run _scripts | xargs shfmt -w -i 2 -ci -bn
"""

[tasks."format:check"]
description = "Check shell script formatting (no writes)"
dir = "dotfiles"
run = """
mise run _scripts | xargs shfmt -d -i 2 -ci -bn
"""

[tasks.lint]
description = "Lint shell scripts with shellcheck"
dir = "dotfiles"
run = """
mise run _scripts | xargs shellcheck
"""

[tasks.check]
description = "Run format check and lint"
dir = "dotfiles"
depends = ["format:check", "lint"]

[tasks.diff]
description = "Show mise dotfiles status"
dir = "dotfiles"
run = "mise dotfiles status"

[tasks.dry-run]
description = "Dry-run mise dotfiles apply"
dir = "dotfiles"
run = "mise dotfiles apply --dry-run"
