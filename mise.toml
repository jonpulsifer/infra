[env]
_.file = '.env'

[tools]
1password-cli = "latest"
bat = "latest"
cilium-cli = "latest"
delta = "latest"
eza = "latest"
flux2 = "latest"
fzf = "latest"
gcloud = "latest"
helm = "latest"
k9s = "latest"
kubectl = "latest"
kustomize = "latest"
sops = "latest"
terraform = "latest"
terraform-docs = "latest"

[tasks.devshell]
description = "Enter the Nix dev shell"
run = "nix develop"

[tasks.fmt]
description = "Format Nix + Terraform"
run = [
  "nix develop -c nix fmt",
  "terraform fmt -recursive",
]

[tasks."nix:fmt"]
description = "Format Nix files"
run = "nix develop -c nix fmt"

[tasks."tf:fmt"]
description = "Format Terraform files"
run = "terraform fmt -recursive"

[tasks."tf:init"]
description = "Initialize Terraform modules without backends"
run = [
  "bash -lc 'for d in terraform/argo terraform/cloudflare terraform/tailscale terraform/unifi terraform/vault terraform/google-workspace terraform/k8s terraform/gcp/organization terraform/gcp/projects/*; do [ -d \"$d\" ] || continue; echo \"==> terraform init -backend=false $d\"; terraform -chdir=\"$d\" init -backend=false -input=false; done'",
]

[tasks."tf:validate"]
description = "Validate Terraform modules"
depends = ["tf:init"]
run = [
  "bash -lc 'for d in terraform/argo terraform/cloudflare terraform/tailscale terraform/unifi terraform/vault terraform/google-workspace terraform/k8s terraform/gcp/organization terraform/gcp/projects/*; do [ -d \"$d\" ] || continue; echo \"==> terraform validate $d\"; terraform -chdir=\"$d\" validate; done'",
]

[tasks."tf:plan"]
description = "Run Terraform plan for one module (set TF_DIR)"
run = [
  "bash -lc 'if [ -z \"$TF_DIR\" ]; then echo \"Set TF_DIR, e.g. TF_DIR=unifi mise run tf:plan\"; exit 1; fi; terraform -chdir=\"$TF_DIR\" init -input=false && terraform -chdir=\"$TF_DIR\" plan'",
]
