apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  # Operational (non-network) knobs. Hand-edited.
  # Network facts (IPs/CIDRs/ASNs) live in the generated cluster-topology
  # ConfigMap — source of truth topology/topology.json. See topology/README.md.
  TIMEZONE: America/Halifax
  CERT_CLUSTER_ISSUER: letsencrypt-production
