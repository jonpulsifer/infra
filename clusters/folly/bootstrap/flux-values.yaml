instance:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
  sync:
    kind: GitRepository
    name: infra
    url: "ssh://git@github.com/jonpulsifer/infra"
    ref: "refs/heads/main"
    path: "clusters/folly/flux-system"
    pullSecret: "flux-github-app-credentials"
    interval: "1h"
