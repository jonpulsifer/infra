---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./clusters/folly/networking/tailscale
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  # CRDs exist only after the operator HelmRelease is ready; connectors need them.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: tailscale
      namespace: tailscale
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
