  l7:
    backend: envoy
nodePort:
  enabled: true
k8sNetworkPolicy:
  enabled: true
operator:
  dashboards:
    enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
      labels:
        release: prom-stack