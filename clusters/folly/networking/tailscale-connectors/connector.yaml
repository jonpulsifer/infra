---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: folly-k8s-lan-router
spec:
  replicas: 1
  hostnamePrefix: folly-k8s-lan-router
  subnetRouter:
    advertiseRoutes:
      - 10.1.0.0/24
      - 10.2.0.0/24
      - ${K8S_NODE_CIDR}
      - ${LB_RANGE}
  tags:
    - tag:k8s
    - tag:folly
    - tag:k8s-folly
