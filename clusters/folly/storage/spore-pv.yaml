---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: spore
  labels:
    type: nfs
spec:
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: spore.lolwtf.ca
    path: /nfs/data/k8s/
