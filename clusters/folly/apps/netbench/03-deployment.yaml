apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbench
  namespace: netbench
  labels:
    app.kubernetes.io/name: netbench
    app.kubernetes.io/part-of: netbench
  annotations:
    # Restart when the targets ConfigMap changes (netbench reads it at startup).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbench
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbench
        app.kubernetes.io/part-of: netbench
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netbench
          image: docker.io/jonpulsifer/netbench:latest@sha256:297a2b717c6818900861e51d8d50fa46695619f57e4b6f13c09bb40520ab26fd
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NETBENCH_TARGETS_FILE
              value: /etc/netbench/targets.json
            # iperf3 creates a short-lived stream buffer with mkstemp(3).
            - name: TMPDIR
              value: /tmp
          volumeMounts:
            - name: targets
              mountPath: /etc/netbench
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: targets
          configMap:
            name: netbench-targets
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
