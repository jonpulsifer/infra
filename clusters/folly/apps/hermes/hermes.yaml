# =============================================================================
# Hermes Agent — HelmRelease
# =============================================================================
#
# Secrets are rendered by the ai-agent chart from envSecrets below. The
# referenced 1Password fields are intentionally the existing item fields:
# Password items use property "password"; the service-account token uses
# property "credential".
#
# IMPORTANT: hermes-agent now refuses to bind its dashboard (port 9119) to
# 0.0.0.0 unless a DashboardAuthProvider is registered (the bundled "nous"
# OAuth plugin only auto-registers when HERMES_DASHBOARD_OAUTH_CLIENT_ID is
# set, which requires an external Nous Portal account). This HelmRelease
# uses the bundled dashboard_auth/basic plugin instead. Before deploying,
# create a "hermes dashboard basic auth" Login item in the Homelab
# 1Password vault with "username" and "password" fields.
# =============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: agents-sandbox
spec:
  interval: 5m0s
  chart:
    spec:
      chart: packages/charts/ai-agent
      version: ">=0.1.3"
      interval: 10m0s
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: infra
        namespace: flux-system
  values:
    image: nousresearch/hermes-agent:latest
    port: 8642
    ingress:
      enabled: false
    envSecrets:
      - name: op-service-account-token
        envVar: OP_SERVICE_ACCOUNT_TOKEN
        onePasswordItem: "Service Account Auth Token: rowbutt"
        property: credential
        secretKey: token
      - name: api-server-key
        envVar: API_SERVER_KEY
        onePasswordItem: "hermes api server key"
        property: password
      - name: opencode-go-api-key
        envVar: OPENCODE_GO_API_KEY
        onePasswordItem: "opencode api key"
        property: password
      - name: discord-bot-token
        envVar: DISCORD_BOT_TOKEN
        onePasswordItem: "rowbutt discord bot token"
        property: password
      - name: elevenlabs-api-key
        envVar: ELEVENLABS_API_KEY
        onePasswordItem: "rowbutt elevenlabs api key"
        property: password
      - name: dashboard-auth-username
        envVar: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
        onePasswordItem: "hermes dashboard basic auth"
        property: username
      - name: dashboard-auth-password
        envVar: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
        onePasswordItem: "hermes dashboard basic auth"
        property: password
    hermes:
      enabled: true
      dataVolume:
        enabled: true
        storageSize: 5Gi
      env:
        - name: API_SERVER_ENABLED
          value: "true"
        - name: API_SERVER_HOST
          value: "0.0.0.0"
        - name: API_SERVER_PORT
          value: "8642"
        - name: API_SERVER_CORS_ORIGINS
          value: "https://hermes.${SECRET_DOMAIN}"
        - name: HERMES_DASHBOARD
          value: "1"
        - name: LLM_PROVIDER
          value: "opencode-go"
        - name: LLM_MODEL
          value: "minimax-m3"
        - name: OPENCODE_GO_BASE_URL
          value: "https://opencode.ai/zen/go/v1/messages"
        - name: SLACK_CHANNEL_GENERAL
          value: "#general"
        - name: SLACK_CHANNEL_CHORES
          value: "#chores"
        - name: SLACK_CHANNEL_CARBAMA05
          value: "CARBAMA05"
        - name: SLACK_REQUIRE_MENTION
          value: "true"
        - name: SLACK_ALLOWED_USERS
          value: "UAR78LSKC"
        - name: DISCORD_GUILD_ID
          value: "1509024936717455381"
        - name: DISCORD_HOME_CHANNEL
          value: "1509024937422356532"
        - name: DISCORD_HOME_CHANNEL_NAME
          value: "#general"
        - name: DISCORD_FREE_RESPONSE_CHANNELS
          value: "1509024937422356532,1509024937422356533"
        - name: DISCORD_ALLOWED_USERS
          value: "308072071949320204"
    resources:
      requests:
        memory: 1Gi
        cpu: 100m
      limits:
        memory: 4Gi
        cpu: 2000m
