apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: hermes
  namespace: agents-sandbox
  annotations:
    cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
spec:
  gatewayClassName: cilium
  listeners:
    - name: https-hermes
      protocol: HTTPS
      port: 443
      hostname: "hermes.${SECRET_DOMAIN}"
      tls:
        certificateRefs:
          - kind: Secret
            name: "hermes.${SECRET_DOMAIN}"
    # Compatibility listener for the old Walter/OpenClaw endpoint. Traffic is
    # now served by Hermes so bookmarks and DNS can move independently.
    - name: https-walter
      protocol: HTTPS
      port: 443
      hostname: "walter.lolwtf.ca"
      tls:
        certificateRefs:
          - kind: Secret
            name: "walter.lolwtf.ca"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hermes
  namespace: agents-sandbox
spec:
  parentRefs:
    - name: hermes
  hostnames:
    - "hermes.${SECRET_DOMAIN}"
    - "walter.lolwtf.ca"
  rules:
    - backendRefs:
        - name: hermes-ai-agent
          port: 9119
