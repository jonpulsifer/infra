apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: hermes
  namespace: agents-sandbox
  annotations:
    cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
spec:
  gatewayClassName: cilium
  listeners:
    - name: https-hermes
      protocol: HTTPS
      port: 443
      hostname: &hostname "hermes.${SECRET_DOMAIN}"
      tls:
        certificateRefs:
          - kind: Secret
            name: *hostname
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hermes
  namespace: agents-sandbox
spec:
  parentRefs:
    - name: hermes
  hostnames:
    - "hermes.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: hermes-ai-agent
          port: 9119