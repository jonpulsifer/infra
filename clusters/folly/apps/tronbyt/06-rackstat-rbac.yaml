---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rackstat
  namespace: tronbyt
  labels:
    app.kubernetes.io/name: rackstat
    app.kubernetes.io/part-of: tronbyt
---
# rackstat reads Flux CRD status directly because gotk_* metrics are not
# scraped into Prometheus. Read-only, cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rackstat-flux-reader
  labels:
    app.kubernetes.io/name: rackstat
    app.kubernetes.io/part-of: tronbyt
rules:
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rackstat-flux-reader
  labels:
    app.kubernetes.io/name: rackstat
    app.kubernetes.io/part-of: tronbyt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rackstat-flux-reader
subjects:
  - kind: ServiceAccount
    name: rackstat
    namespace: tronbyt
