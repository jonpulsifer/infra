apiVersion: apps/v1
kind: Deployment
metadata:
  name: tronbyt
  namespace: tronbyt
  labels: &labels
    app.kubernetes.io/name: tronbyt
    app.kubernetes.io/part-of: tronbyt
spec:
  replicas: 1
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tronbyt
          image: ghcr.io/tronbyt/server:2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          env:
            - name: ENABLE_USER_REGISTRATION
              value: "false"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: tronbyt-data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tronbyt-data
          persistentVolumeClaim:
            claimName: tronbyt-data
