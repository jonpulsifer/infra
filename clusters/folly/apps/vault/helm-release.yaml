---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  chart:
    spec:
      chart: openbao
      version: 0.28.5
      sourceRef:
        kind: HelmRepository
        name: openbao
  values:
    # No workloads use agent injection; avoid deploying the Vault-compatible injector.
    injector:
      enabled: false
    server:
      enabled: true
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
          hajimari.io/icon: safe
        hosts:
          - host: &host "vault.${SECRET_DOMAIN}"
        tls:
          - hosts:
              - *host
            secretName: *host
      extraEnvironmentVars:
        GOOGLE_APPLICATION_CREDENTIALS: /var/run/secrets/google/credentials.json
      logLevel: debug
      dataStorage:
        enabled: true
      standalone:
        enabled: true
        config: |
          api_addr     = "https://0.0.0.0:8200"
          cluster_addr = "https://0.0.0.0:8201"
          ui = true

          seal "gcpckms" {
            project     = "homelab-ng"
            region      = "northamerica-northeast1"
            key_ring    = "openbao"
            crypto_key  = "openbao"
          }

          storage "raft" {
            path    = "/openbao/data"
            node_id = "vault-openbao-0"
          }

          listener "tcp" {
            address                  = "0.0.0.0:8200"
            tls_disable              = true
            tls_disable_client_certs = true
          }
      volumeMounts:
        - name: google-wif
          mountPath: /var/run/secrets/google
          readOnly: true
      volumes:
        - name: google-wif
          projected:
            defaultMode: 288 # 0440
            sources:
              - serviceAccountToken:
                  audience: https://iam.googleapis.com/projects/629296473058/locations/global/workloadIdentityPools/fml-pool/providers/folly
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: vault-gcp-wif
                  items:
                    - key: credentials.json
                      path: credentials.json
    ui:
      enabled: true
