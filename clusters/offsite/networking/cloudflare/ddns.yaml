---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns
  namespace: cloudflare
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 300
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          containers:
            - name: ddns
              image: jonpulsifer/bashcurljq:latest
              envFrom:
                - secretRef:
                    name: ddns
              command:
                - "/bin/bash"
                - "/app/ddns.sh"
              securityContext:
                runAsUser: 65532
                runAsGroup: 65532
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: ddns
                  mountPath: /app/ddns.sh
                  subPath: ddns.sh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: ddns
              projected:
                defaultMode: 0775
                sources:
                  - configMap:
                      name: ddns
                      items:
                        - key: ddns.sh
                          path: ddns.sh
            - name: tmp
              emptyDir: {}
