---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: valkey-operator
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./clusters/base/platform/valkey-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: valkey-operator
      namespace: valkey-operator-system
