apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  # Operational (non-network) knobs. Hand-edited.
  # Network facts (IPs/CIDRs/ASNs) live in the cluster-topology
  # ConfigMap (cluster-topology.json) — the network single source of truth.
  TIMEZONE: America/Halifax
  CERT_CLUSTER_ISSUER: letsencrypt-production
