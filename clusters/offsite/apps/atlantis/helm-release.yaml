---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atlantis
  namespace: atlantis
spec:
  chart:
    spec:
      chart: atlantis
      version: 6.5.1
      sourceRef:
        kind: HelmRepository
        name: atlantis
  values:
    image:
      repository: jonpulsifer/atlantis
      tag: latest@sha256:cd45c70637a51f9befa2a4dbd0bcf623a06a01860f36c53d87f4131753e443e9
    orgAllowlist: github.com/jonpulsifer/*
    environment:
      ATLANTIS_AUTOMERGE: "true"
      ATLANTIS_EMOJI_REACTION: "eyes"
      ATLANTIS_ENABLE_DIFF_MARKDOWN_FORMAT: "true"
      ATLANTIS_ENABLE_POLICY_CHECKS: "true"
      ATLANTIS_FAIL_ON_PRE_WORKFLOW_HOOK_ERROR: "true"
      ATLANTIS_WRITE_GIT_CREDS: "true"
      ATLANTIS_AUTOPLAN_MODULES: "true"
      # Default is "**/*.tf*"; also autoplan when the unifi_bgp sidecar configs
      # pulled in via file() change. Scoped to "terraform/**/*.conf" (not an
      # unanchored "**/*.conf") — Atlantis attempts a plan in every directory
      # containing a file matching this list, .tf or not, and fails loudly
      # ("No configuration files") if there's no actual Terraform there. An
      # unscoped glob previously matched dotfiles/.tmux.conf and
      # dotfiles/.gnupg/gpg.conf, breaking PR checks for unrelated dotfiles
      # changes. The narrower "network/unifi/**/*.conf" was tried first and
      # failed to match (this globstar implementation needs 2+ path segments
      # for "**"; unifi/folly/bgp-folly.conf only has one) — "terraform/**/*.conf"
      # has enough segments before the target file to avoid that.
      ATLANTIS_AUTOPLAN_FILE_LIST: "**/*.tf*,terraform/**/*.conf"
      # OpenTofu for every root: state-format compatible with Terraform, and
      # terraform/pki needs the opentofu/tls provider fork (max_path_length),
      # which only exists on the OpenTofu registry. Server-wide because the
      # server-side repos[] config has no per-project terraform_distribution.
      ATLANTIS_DEFAULT_TF_DISTRIBUTION: "opentofu"
      # ATLANTIS_SILENCE_FORK_PR_ERRORS: "true"
      GOOGLE_APPLICATION_CREDENTIALS: "/run/secrets/terraform.json"
      GOOGLEWORKSPACE_CREDENTIALS: "/run/secrets/terraform.json"
      # ArgoCD Provider https://github.com/grpc/grpc-go/issues/434
      ARGOCD_SERVER: "argo.${SECRET_DOMAIN}:443"
      GRPC_ENFORCE_ALPN_ENABLED: "false"
    environmentSecrets:
      - name: ATLANTIS_GH_APP_ID
        secretKeyRef:
          name: atlantis-github
          key: github_app_id
      - name: ATLANTIS_GH_APP_SLUG
        secretKeyRef:
          name: atlantis-github
          key: github_app_slug
      - name: ATLANTIS_GH_APP_KEY
        secretKeyRef:
          name: atlantis-github
          key: github_app_private_key
      - name: OP_SERVICE_ACCOUNT_TOKEN
        secretKeyRef:
          name: atlantis-github
          key: op_service_account
      - name: ARGOCD_AUTH_TOKEN
        secretKeyRef:
          name: atlantis-github
          key: argocd_token
    repoConfig: |
      ---
      repos:
      - id: /^github.com/jonpulsifer/.*$/
        branch: /^main$/
        apply_requirements: []
        workflow: default
        allowed_overrides: []
        allow_custom_workflows: false
        pre_workflow_hooks:
          - run: /home/atlantis/plan-hook.sh
            description: Plan Hook
            commands: plan
      workflows:
        default:
          plan:
            steps: [init, plan]
          apply:
            steps: [apply]
          policy_check:
            steps:
              - show
              - policy_check:
                  extra_args: ["-p /home/atlantis/policies/"]
      policies:
        owners:
          users:
            - jonpulsifer
            - rowbutt
        policy_sets:
          - name: Super Duper Policy Set
            path: /home/atlantis/policies/
            source: local
    hidePrevPlanComments: true
    hideUnchangedPlanComments: true
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
        hajimari.io/enable: "true"
        hajimari.io/icon: "robot-industrial-outline"
      host: &host "atlantis.${SECRET_DOMAIN}"
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - *host
          secretName: *host
    servicemonitor:
      enabled: false
    extraVolumes:
      - name: policies
        configMap:
          name: policies
      - name: plan-hook
        configMap:
          name: plan-hook
          defaultMode: 0777
      - name: terraform-gsa
        secret:
          secretName: atlantis-github
    extraVolumeMounts:
      - name: policies
        mountPath: /home/atlantis/policies/
        readOnly: true
      - name: plan-hook
        mountPath: /home/atlantis/plan-hook.sh
        subPath: plan-hook.sh
        readOnly: true
      - name: terraform-gsa
        mountPath: /run/secrets/terraform.json
        subPath: terraform.json
        readOnly: true
    readinessProbe:
      periodSeconds: 10
