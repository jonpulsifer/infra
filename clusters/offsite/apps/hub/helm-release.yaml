---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hub
  namespace: hub
spec:
  interval: 1h
  chart:
    spec:
      chart: packages/charts/app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: infra
        namespace: flux-system
  values:
    fullnameOverride: hub
    image: ghcr.io/jonpulsifer/hub:latest@sha256:a2d4ecfbccc8b0e5b3dcaa0484d51efd5d6d8a4c24c3b2e6871583254b0c8a7d
    command: "bun run start"
    port: 3000
    hostname: hub.lolwtf.ca
    sandbox: false
    env:
      - name: TEMPESTWX_IGNORE_STATIONS
        value: "85191"
    envFromSecret: hub-env
    ingress:
      enabled: true
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
