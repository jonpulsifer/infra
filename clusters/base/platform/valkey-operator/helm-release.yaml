---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey-operator
  namespace: valkey-operator-system
spec:
  interval: 1m0s
  maxHistory: 2
  chart:
    spec:
      chart: valkey-operator
      version: 0.3.1
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
      interval: 5m0s
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  values: {}
