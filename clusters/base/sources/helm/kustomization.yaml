---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - argo.yaml
  - atlantis.yaml
  - cloudnative-pg.yaml
  - descheduler.yaml
  - external-secrets.yaml
  - external-dns.yaml
  - falco.yaml
  - grafana.yaml
  - hajimari.yaml
  - intel.yaml
  - jetstack.yaml
  - jonpulsifer.yaml
  - metrics-server.yaml
  - nfs-subdir-external-provisioner.yaml
  - node-feature-discovery.yaml
  - onepassword.yaml
  - open-webui.yaml
  - prometheus.yaml
  - stefanprodan.yaml
  - tailscale.yaml
  - vector.yaml
patches:
  - target:
      group: source.toolkit.fluxcd.io
      version: v1
      kind: HelmRepository
    patch: |-
      - op: replace
        path: /spec/interval
        value: 24h
