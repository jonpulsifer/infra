name: oidc

# Publishes the FML cluster OIDC issuers (oidc.lolwtf.ca) to Cloudflare Pages.
# Source of truth is terraform/pki/oidc/<cluster>/ (generated by
# scripts/pki/post-rotate.sh); the Pages project/domain/DNS are Terraform-managed
# in terraform/network/cloudflare/oidc.tf. The issuer URL layout is fixed by the
# OIDC discovery spec: <issuer>/.well-known/openid-configuration and the
# jwks_uri it advertises (<issuer>/openid/v1/jwks, matching kube-apiserver).

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/pki/oidc/**'
      - '.github/workflows/oidc.yml'
  pull_request:
    paths:
      - 'terraform/pki/oidc/**'
      - '.github/workflows/oidc.yml'

concurrency:
  group: oidc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p dist
          for cluster in folly offsite; do
            src="terraform/pki/oidc/$cluster"
            [ -d "$src" ] || continue
            bun -e "const d = await Bun.file('$src/openid-configuration.json').json(); if (!d.issuer) throw new Error('no issuer')"
            bun -e "const d = await Bun.file('$src/jwks.json').json(); if (!(d.keys?.length > 0)) throw new Error('empty jwks')"
            mkdir -p "dist/$cluster/.well-known" "dist/$cluster/openid/v1"
            cp "$src/openid-configuration.json" "dist/$cluster/.well-known/openid-configuration"
            cp "$src/jwks.json" "dist/$cluster/openid/v1/jwks"
          done
          # Extensionless JSON needs explicit headers; keep max-age short so
          # signer rotation propagates to verifiers quickly.
          cat > dist/_headers <<'EOF'
          /:cluster/.well-known/openid-configuration
            Content-Type: application/json; charset=utf-8
            Cache-Control: public, max-age=300

          /:cluster/openid/v1/jwks
            Content-Type: application/json; charset=utf-8
            Cache-Control: public, max-age=300
          EOF
          find dist -type f | sort

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # fml account (terraform/network/cloudflare/account.tf)
          CLOUDFLARE_ACCOUNT_ID: d7f641bb9f4b9de593f721ad06989dbe
        run: |
          set -euo pipefail
          bun x wrangler pages deploy dist --project-name=fml-oidc --branch=main | tee wrangler-output.log
          grep --fixed-strings --quiet 'Deployment complete!' wrangler-output.log

      - name: Verify public issuer endpoints
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            failed=false
            for cluster in folly offsite; do
              [ -d "terraform/pki/oidc/$cluster" ] || continue
              for path in .well-known/openid-configuration openid/v1/jwks; do
                url="https://oidc.lolwtf.ca/$cluster/$path"
                if ! curl --fail --silent --show-error --max-time 10 "$url" >/dev/null; then
                  failed=true
                fi
              done
            done
            if [ "$failed" = false ]; then
              exit 0
            fi
            echo "issuer endpoints not ready (attempt $attempt/12)"
            sleep 5
          done
          exit 1
