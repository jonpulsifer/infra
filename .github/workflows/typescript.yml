name: TypeScript

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/hub/**"
      - "apps/slingshot/**"
      - "apps/spore/**"
      - "packages/k6/**"
      - "packages/typescript-config/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "biome.json"
      - ".github/workflows/typescript.yml"
  push:
    branches: [main]
    paths:
      - "apps/hub/**"
      - "apps/slingshot/**"
      - "apps/spore/**"
      - "packages/k6/**"
      - "packages/typescript-config/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "biome.json"
      - ".github/workflows/typescript.yml"

permissions:
  contents: read

concurrency:
  group: typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
      - name: Test
        run: bun run test
