name: "Terraform"
on:
  push:
    branches:
      - main
    paths:
      - argo/**
      - cloudflare/**
      - gcp/**
      - k8s/**.tf
      - unifi/**
      - vault/**
      - workspace/**
  pull_request:
    paths:
      - cloudflare/**
      - gcp/**
      - unifi/**
      - vault/**
      - workspace/**
jobs:
  changed-directories:
    name: Get Changed Files
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Directories with Changes
        id: changed-directories
        uses: tj-actions/changed-files@v44
        with:
          dir_names: true
          matrix: true
          files: |
            **/*.tf
            **/*.lock.hcl
      - name: List all changed directories
        run: echo '${{ steps.changed-directories.outputs.all_changed_files }}'

  validate:
    # name: 'fmt, init, validate'
    needs: [changed-directories]
    if: ${{ needs.changed-directories.outputs.matrix != '[]' }}
    strategy:
      matrix:
        dirs: ${{ fromJSON(needs.changed-directories.outputs.matrix) }}
      fail-fast: true
    runs-on: infra
    defaults:
      run:
        working-directory: ${{ matrix.dirs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true
      - name: Terraform Init
        id: init
        run: terraform init -backend=false
      - name: Terraform Validate
        id: validate
        run: terraform validate
