name: "Terraform"
on:
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
  pull_request:
    paths:
      - '**/*.tf'

# Cancel superseded runs on the same ref instead of letting them pile up.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-directories:
    name: Get Changed Files
    runs-on: ubuntu-latest
    outputs:
      # Output a JSON string list of unique directories containing changed files matching the patterns
      directories: ${{ steps.expand-directories.outputs.directories }}
      # Output 'true' or 'false' as a string
      any_changed: ${{ steps.changed-directories.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - name: Directories with Changes
        id: changed-directories
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          dir_names: true
          matrix: true
          files: |
            **/*.tf
            **/.terraform.lock.hcl
      - name: Expand Terraform root directories
        id: expand-directories
        if: steps.changed-directories.outputs.any_changed == 'true'
        env:
          CHANGED_DIRECTORIES: ${{ steps.changed-directories.outputs.all_changed_files }}
        run: |
          set -euo pipefail

          declare -A directories=()
          while IFS= read -r dir; do
            while [[ -n "$dir" && "$dir" != "." ]]; do
              if compgen -G "$dir/*.tf" > /dev/null; then
                directories["$dir"]=1
              fi
              if [[ "$dir" != */* ]]; then
                break
              fi
              dir="${dir%/*}"
            done
          done < <(jq -r '.[]' <<< "$CHANGED_DIRECTORIES")

          matrix="$(printf '%s\n' "${!directories[@]}" | sort | jq -R -s -c 'split("\n")[:-1]')"
          echo "directories=$matrix" >> "$GITHUB_OUTPUT"

  validate:
    needs: [changed-directories]
    runs-on: ubuntu-latest
    if: needs.changed-directories.outputs.any_changed == 'true'
    strategy:
      fail-fast: false # Keep running other matrix jobs even if one fails
      matrix:
        dir: ${{ fromJSON(needs.changed-directories.outputs.directories) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - name: Terraform Init
        id: init
        run: terraform init -backend=false
      - name: Terraform Validate
        id: validate
        run: terraform validate

  # Formatting is enforced on the PR (a check), not auto-committed to main —
  # branch protection rejects bot pushes, and a PR check also avoids the
  # noise-commit -> re-trigger-CI cascade the old auto-format job caused.
  # Fix drift locally with `mise run tf:fmt` (and `mise run tf:docs`).
  fmt:
    needs: [changed-directories]
    runs-on: ubuntu-latest
    if: needs.changed-directories.outputs.any_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
