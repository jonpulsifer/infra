name: "Terraform"
on:
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - '**/*.tftest.hcl'
      - '**/.terraform.lock.hcl'
      - terraform/network/unifi/folly/lab.tf.json
      - .github/scripts/validation-impact.sh
      - .github/scripts/validation-impact_test.sh
      - .github/workflows/terraform.yml
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tftest.hcl'
      - '**/.terraform.lock.hcl'
      - terraform/network/unifi/folly/lab.tf.json
      - .github/scripts/validation-impact.sh
      - .github/scripts/validation-impact_test.sh
      - .github/workflows/terraform.yml

# Cancel superseded runs on the same ref instead of letting them pile up.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-directories:
    name: Get Changed Files
    runs-on: ubuntu-latest
    outputs:
      # Output a JSON string list of Terraform roots affected by changed paths.
      directories: ${{ steps.routing.outputs.directories }}
      # Output 'true' or 'false' as a string
      any_changed: ${{ steps.routing.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Changed validation inputs
        id: changed-paths
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          separator: "\n"
          files: |
            **/*.tf
            **/*.tftest.hcl
            **/.terraform.lock.hcl
            terraform/network/unifi/folly/lab.tf.json
            .github/scripts/validation-impact.sh
            .github/scripts/validation-impact_test.sh
            .github/workflows/terraform.yml
      - name: Resolve affected Terraform roots
        id: routing
        env:
          CHANGED_PATHS: ${{ steps.changed-paths.outputs.all_changed_files }}
        run: |
          set -euo pipefail
          matrix="$(printf '%s\n' "$CHANGED_PATHS" \
            | .github/scripts/validation-impact.sh targets \
            | sed -n 's/^terraform://p' \
            | jq -R -s -c 'split("\n")[:-1]')"
          echo "directories=$matrix" >> "$GITHUB_OUTPUT"
          if [[ "$matrix" == '[]' ]]; then
            echo 'any_changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'any_changed=true' >> "$GITHUB_OUTPUT"
          fi

  routing-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: bash .github/scripts/validation-impact_test.sh

  validate:
    needs: [changed-directories]
    runs-on: ubuntu-latest
    if: needs.changed-directories.outputs.any_changed == 'true'
    strategy:
      fail-fast: false # Keep running other matrix jobs even if one fails
      matrix:
        dir: ${{ fromJSON(needs.changed-directories.outputs.directories) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # OpenTofu matches the Atlantis apply path (ATLANTIS_DEFAULT_TF_DISTRIBUTION)
      # and can fetch the opentofu/* forked providers terraform cannot.
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      - name: Tofu Init
        id: init
        run: tofu init -backend=false
      - name: Tofu Validate
        id: validate
        run: tofu validate
      - name: Tofu Test
        run: tofu test

  # Formatting is enforced on the PR (a check), not auto-committed to main —
  # branch protection rejects bot pushes, and a PR check also avoids the
  # noise-commit -> re-trigger-CI cascade the old auto-format job caused.
  # Fix drift locally with `mise run tf:fmt` (and `mise run tf:docs`).
  fmt:
    needs: [changed-directories]
    runs-on: ubuntu-latest
    if: needs.changed-directories.outputs.any_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      - name: Tofu fmt check
        run: tofu fmt -check -recursive
