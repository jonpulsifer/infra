name: nix
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changed-paths:
    name: Resolve validation impact
    runs-on: ubuntu-latest
    outputs:
      nix_changed: ${{ steps.targets.outputs.nix_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - id: changed-paths
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          separator: "\n"
          files: '**'
      - id: targets
        env:
          CHANGED_PATHS: ${{ steps.changed-paths.outputs.all_changed_files }}
        run: |
          set -euo pipefail
          if printf '%s\n' "$CHANGED_PATHS" | .github/scripts/validation-impact.sh targets | grep -qx 'nix:flake-check'; then
            echo 'nix_changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'nix_changed=false' >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: changed-paths
    if: needs.changed-paths.outputs.nix_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: DeterminateSystems/flake-checker-action@de924abd783455e8429c858962b9e43062d19da1 # main
      - run: nix flake check
  nixos:
    runs-on: ubuntu-latest
    needs: [changed-paths, check]
    if: needs.changed-paths.outputs.nix_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonpulsifer
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.ref != 'refs/heads/main' }}
      - run: nix build .#nixosConfigurations.optiplex.config.system.build.toplevel
  spore:
    name: Build native Spore package and host
    runs-on: ubuntu-24.04-arm
    needs: [changed-paths, check]
    if: needs.changed-paths.outputs.nix_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonpulsifer
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.ref != 'refs/heads/main' }}
      - run: >-
          nix build
          .#nixosConfigurations.spore.config.system.build.toplevel
  images:
    needs: [changed-paths, check]
    if: needs.changed-paths.outputs.nix_changed == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Build the complete image set rather than maintaining a second copy of
      # the Nix import graph to guess which outputs a change affects.
      matrix:
        include:
          - image: container
            runner: ubuntu-latest
            attribute: packages.x86_64-linux.container
          - image: wsl
            runner: ubuntu-latest
            attribute: packages.x86_64-linux.wsl
          - image: rackpi5
            runner: ubuntu-24.04-arm
            attribute: nixosConfigurations.rackpi5.config.system.build.piBootImg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonpulsifer
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.ref != 'refs/heads/main' }}
      - name: Build ${{ matrix.image }} image
        run: nix build ".#${{ matrix.attribute }}"
      - name: Build WSL tarball
        if: matrix.image == 'wsl'
        run: sudo ./result/bin/nixos-wsl-tarball-builder ./nixos.wsl
