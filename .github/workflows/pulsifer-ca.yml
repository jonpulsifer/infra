name: pulsifer.ca

on:
  push:
    branches:
      - main
    paths:
      - 'apps/pulsifer.ca/**'
      - '.github/workflows/pulsifer-ca.yml'
  pull_request:
    paths:
      - 'apps/pulsifer.ca/**'
      - '.github/workflows/pulsifer-ca.yml'

concurrency:
  group: pulsifer-ca-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Tailwind CSS CLI
        env:
          TAILWIND_VERSION: 4.3.2
          TAILWIND_SHA256: 5036c4fb4328e0bcdbb6065c70d8ac9452e0d4c947113a788a8f94fd390425c1
        run: |
          curl -fsSLo "$RUNNER_TEMP/tailwindcss" "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
          echo "${TAILWIND_SHA256}  ${RUNNER_TEMP}/tailwindcss" | sha256sum --check -
          chmod +x "$RUNNER_TEMP/tailwindcss"

      - name: Build CSS
        working-directory: apps/pulsifer.ca
        run: '"$RUNNER_TEMP/tailwindcss" --input css/main.css --output assets/css/built.css --minify'

      - name: Build
        working-directory: apps/pulsifer.ca
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/pulsifer.ca/public
