name: wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'apps/wiki/**'
      - 'AGENTS.md'
      - 'README.md'
      - '.github/scripts/docs-contract.sh'
      - '.github/workflows/wiki.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'apps/wiki/**'
      - 'AGENTS.md'
      - 'README.md'
      - '.github/scripts/docs-contract.sh'
      - '.github/workflows/wiki.yml'

concurrency:
  group: wiki-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Gates the deploy below: every wikilink resolves, every referenced repo
      # path exists, no past-tense archaeology. See AGENTS.md "Writing rule".
      - name: Docs contract
        run: bash .github/scripts/docs-contract.sh

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: apps/wiki
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        working-directory: apps/wiki
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # fml account (terraform/network/cloudflare/account.tf)
          CLOUDFLARE_ACCOUNT_ID: d7f641bb9f4b9de593f721ad06989dbe
        run: bun x wrangler pages deploy dist --project-name=infra-wiki --branch=main
