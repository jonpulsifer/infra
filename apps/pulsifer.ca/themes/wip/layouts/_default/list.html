{{ define "main" }}
<main class="py-10 sm:py-14">
  <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-zinc-50">{{ .Title }}</h1>
  <div class="mt-8 flex flex-col gap-8">
    {{ range .Pages }}
    <article class="border-b border-dashed border-zinc-800/70 pb-8 last:border-b-0">
      <h2 class="text-xl font-semibold tracking-tight">
        <a href="{{ .Permalink }}" class="text-zinc-100 transition-colors hover:text-accent">{{ .Title }}</a>
      </h2>
      <div class="mt-2">{{ partial "post-meta" . }}</div>
      {{ with .Summary }}
      <p class="mt-3 text-sm leading-relaxed text-zinc-400">{{ . | plainify | truncate 240 }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
