{{ define "main" }}
<main class="py-10 sm:py-14">
  <article>
    <header class="mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-balance">
        <a href="{{ .Page.RelPermalink }}" class="text-zinc-50 transition-colors hover:text-accent">{{ .Title }}</a>
      </h1>
      <div class="mt-3">{{ partial "post-meta" . }}</div>
    </header>
    {{ if and (.Params.toc) (gt .WordCount 400) }}
    {{ with .TableOfContents }}
    <div class="mb-10 rounded-sm border border-dashed border-zinc-800 bg-surface p-4">
      <p class="mb-2 font-mono text-xs uppercase tracking-widest text-accent"><span class="select-none" aria-hidden="true">&gt;&gt;</span> contents</p>
      <div class="font-mono text-sm leading-relaxed">{{ . }}</div>
    </div>
    {{ end }}
    {{ end }}
    <div class="prose prose-invert prose-zinc max-w-none
                prose-headings:tracking-tight prose-headings:text-zinc-50
                prose-a:text-accent prose-a:decoration-accent/40 prose-a:underline-offset-4 hover:prose-a:text-accent-bright hover:prose-a:decoration-accent-bright
                prose-strong:text-zinc-100
                prose-code:text-accent-bright prose-code:before:content-none prose-code:after:content-none prose-code:bg-surface prose-code:rounded-sm prose-code:px-1.5 prose-code:py-0.5 prose-code:font-normal
                prose-blockquote:border-l-accent prose-blockquote:border-l-2
                prose-th:font-mono prose-th:text-xs prose-th:uppercase prose-th:tracking-widest prose-th:text-zinc-400
                prose-li:marker:text-accent">
      {{ .Content }}
    </div>
    {{ with .Params.tags }}
    <ul class="mt-10 flex flex-wrap gap-2 font-mono text-xs">
      {{ range . }}
      <li><a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}" class="inline-block rounded-sm border border-dashed border-zinc-800 px-2 py-1 text-zinc-400 transition-colors hover:border-accent hover:text-accent">[{{ . }}]</a></li>
      {{ end }}
    </ul>
    {{ end }}
  </article>
</main>
{{ end }}
