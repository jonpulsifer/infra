<header class="border-b border-dashed border-zinc-800">
  <div class="max-w-3xl mx-auto px-5 sm:px-6 h-14 flex items-center justify-between gap-4">
    <div class="font-mono text-[15px] font-semibold">
      <a href="{{ .Site.BaseURL }}" class="text-zinc-100 transition-colors hover:text-ember">
        <span class="text-ember">{{ .Site.Params.prompt }}</span>
        {{ .Site.Title }}<span class="cursor-blink text-ember" aria-hidden="true">▌</span>
      </a>
    </div>
    {{- with .Site.Menus.main }}
    <nav class="font-mono text-sm" aria-label="main navigation">
      <ul class="flex items-center">
        {{- range . }}
        <li class="flex items-center">
          <span class="text-zinc-700 select-none" aria-hidden="true">|</span>
          <a href="{{ .URL | relURL }}" class="px-2.5 sm:px-3 text-zinc-400 transition-colors hover:text-ember">{{ .Name }}</a>
        </li>
        {{- end }}
        <li><span class="text-zinc-700 select-none" aria-hidden="true">|</span></li>
      </ul>
    </nav>
    {{- end }}
  </div>
</header>
