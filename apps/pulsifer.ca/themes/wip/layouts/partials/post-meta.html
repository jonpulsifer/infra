<div class="font-mono text-xs text-zinc-500 flex flex-wrap items-center gap-x-2 gap-y-1">
  <time class="text-zinc-400" datetime="{{ .PublishDate.Format "2006-01-02" }}" title="{{ .PublishDate }}">{{ .PublishDate.Format "2006-01-02" }}</time>
  <span class="text-zinc-700 select-none" aria-hidden="true">|</span>
  <span>{{ .ReadingTime }} min read</span>
  {{ if .Params.ShowAuthor }}
    {{ with .Params.Author }}
      <span class="text-zinc-700 select-none" aria-hidden="true">|</span>
      <span>{{ . }}</span>
    {{ end }}
  {{ end }}
  {{ if .Params.ShowModified }}
    {{ with .Page.Lastmod }}
      <span class="text-zinc-700 select-none" aria-hidden="true">|</span>
      <span title="{{ . }}">updated {{ .Format "2006-01-02" }}</span>
    {{ end }}
  {{ end }}
</div>
