{{ define "main" }}
<main class="flex flex-col items-center justify-center text-center py-16 sm:py-24">
  {{ with .Site.Params.portrait }}
  <a href="{{ .Link }}" class="block w-52 sm:w-64">
    <img src="{{ .Path }}" alt="{{ .AltText }}" class="w-full h-auto" />
  </a>
  {{ end }}
  {{ with .Site.Params.author }}
  <h1 class="mt-8 text-3xl sm:text-4xl font-bold tracking-tight text-zinc-50 text-balance">{{ . }}</h1>
  {{ end }}
  {{ with .Site.Params.tagline }}
  <p class="mt-3 font-mono text-sm text-ember"><span class="select-none" aria-hidden="true">&gt;&gt;</span> {{ . }}</p>
  {{ end }}
  {{ partial "social" . }}
</main>
{{ end }}
