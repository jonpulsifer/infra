image: docker.io/jonpulsifer/ai-agents:latest
port: 8080
hostname: ""
storageSize: 2Gi
command: ""
workspaceDir: ""
openclawStateDir: /home/agent/config/.openclaw

# Path where the existing *-agent-config PVC is mounted. Keep the default for
# config-only persistence, or set to /home/agent to persist the whole home dir.
agentHomeMountPath: /home/agent/config

# Dedicated scratch workspace PVC mounted at /home/agent/workspace.
# Leave disabled when the agent keeps its workspace on the config PVC
# (set workspaceDir to a path under /home/agent/config instead).
workspaceVolume:
  enabled: false

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

ingress:
  enabled: true
  forwardedUser: ""
  mode: shared

npmTools: []
# - "@moonpay/cli"
npmInstallImage: node:24-bookworm
configInstallImage: busybox:1.38.0

# secrets: config that CONTAINS secret material. Synced from 1Password via an
# ExternalSecret (refreshInterval: 1h keeps it up to date) and mounted read-only.
secrets: []
# - name: config
#   onePasswordItem: my-app-config
#   property: config.json
#   mountPath: /config/config.json
#   mountKey: config.json
#   envVar: CONFIG_PATH

# envSecrets: secret values synced from 1Password via ExternalSecret and
# projected directly into the agent container environment.
envSecrets: []
# - name: op-service-account-token
#   envVar: OP_SERVICE_ACCOUNT_TOKEN
#   onePasswordItem: "Service Account Auth Token: rowbutt"
#   property: credential
#   secretKey: token

# configFiles: non-secret config. Rendered into a ConfigMap and copied into the
# config PVC at startup (writable by the agent). Use this when the config has no
# secrets; deliver any secrets the agent needs separately (e.g. via .env/secrets).
# A checksum annotation rolls the sandbox when content changes.
configFiles: []
# - name: config
#   mountPath: /config/config.json
#   mountKey: config.json
#   envVar: CONFIG_PATH
#   content: |
#     {}
