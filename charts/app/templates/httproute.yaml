{{- if .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "app.fullname" . }}-http-route
  namespace: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "app.fullname" . }}-gateway
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - backendRefs:
        - name: {{ include "app.fullname" . }}
          port: {{ .Values.port }}
{{- end }}
