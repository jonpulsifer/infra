! https://blog.stonegarden.dev/articles/2025/11/bgp-cilium-unifi
router bgp 64512
  ! Router ID
  bgp router-id 10.3.0.1

  ! Require explicit policy for eBGP neighbors
  bgp ebgp-requires-policy

  ! Relax autonomous system path matching for multipath routing
  bgp bestpath as-path multipath-relax
  maximum-paths 3

  ! Create peer-group HOMELAB with remote ASN 64513
  neighbor HOMELAB peer-group
  neighbor HOMELAB remote-as 64513

  ! Add node IPs as neighbors
  neighbor 10.3.0.10 peer-group HOMELAB
  neighbor 10.3.0.11 peer-group HOMELAB
  neighbor 10.3.0.12 peer-group HOMELAB

  ! Site-to-site BGP peer (offsite ucg-max, iBGP ASN 64512)
  neighbor OFFSITE peer-group
  neighbor OFFSITE remote-as 64512
  ! Source the session from the LAN router-id, not the WAN/tunnel egress IP,
  ! so packets traverse the SD-WAN and offsite recognizes us as neighbor 10.3.0.1
  neighbor OFFSITE update-source 10.3.0.1
  neighbor 10.89.0.1 peer-group OFFSITE

  ! Apply Policies
  address-family ipv4 unicast
    redistribute connected
    neighbor HOMELAB activate
    neighbor HOMELAB next-hop-self
    neighbor HOMELAB soft-reconfiguration inbound
    neighbor HOMELAB route-map RM-HOMELAB-IN in
    neighbor HOMELAB route-map RM-HOMELAB-OUT out
    neighbor OFFSITE activate
    neighbor OFFSITE next-hop-self
    neighbor OFFSITE soft-reconfiguration inbound
    neighbor OFFSITE route-map RM-OFFSITE-IN in
    neighbor OFFSITE route-map RM-OFFSITE-OUT out
  exit-address-family
exit

! VIPs within the service IP pool
ip prefix-list HOMELAB-IN seq 10 permit 10.3.0.0/26 le 32
ip prefix-list HOMELAB-IN seq 20 permit 10.3.0.64/26 le 32
ip prefix-list HOMELAB-IN seq 30 permit 10.100.0.0/20 le 32

! Accept Service IPs from cluster peers
route-map RM-HOMELAB-IN permit 10
  match ip address prefix-list HOMELAB-IN
exit

! Router client network
ip prefix-list HOMELAB-OUT seq 10 permit 10.1.0.0/24 le 32
ip prefix-list HOMELAB-OUT seq 20 permit 10.2.0.0/24 le 32
ip prefix-list HOMELAB-OUT seq 25 permit 10.3.0.0/26 le 32
ip prefix-list HOMELAB-OUT seq 30 permit 10.13.37.0/24 le 32

! Broadcast client network for cluster peers
route-map RM-HOMELAB-OUT permit 10
  match ip address prefix-list HOMELAB-OUT
exit

! Accept offsite node subnet + LB VIP pool + pod CIDR from offsite ucg-max.
! The node subnet (/28) also arrives via OSPF/Site Magic and loses the RIB
! tie-break (OSPF distance 110 < iBGP 200); the LB VIP /32s and pod /24s are
! BGP-only and install (the /32s win on longest-prefix match regardless).
ip prefix-list OFFSITE-IN seq 10 permit 10.89.0.0/28 le 32
ip prefix-list OFFSITE-IN seq 20 permit 10.89.0.64/26 le 32
ip prefix-list OFFSITE-IN seq 30 permit 10.101.0.0/20 le 32

route-map RM-OFFSITE-IN permit 10
  match ip address prefix-list OFFSITE-IN
exit

! Advertise folly node subnet + LB VIP pool + pod CIDR to offsite ucg-max.
! The /32 VIPs and pod /24s are learned from folly nodes via eBGP; re-advertised
! here so offsite can reach folly Services/pods across the SD-WAN tunnel.
ip prefix-list OFFSITE-OUT seq 10 permit 10.3.0.0/26 le 32
ip prefix-list OFFSITE-OUT seq 20 permit 10.3.0.64/26 le 32
ip prefix-list OFFSITE-OUT seq 30 permit 10.100.0.0/20 le 32

route-map RM-OFFSITE-OUT permit 10
  match ip address prefix-list OFFSITE-OUT
exit
