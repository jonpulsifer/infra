! https://blog.stonegarden.dev/articles/2025/11/bgp-cilium-unifi
router bgp 64512
  ! Router ID
  bgp router-id 10.89.0.1

  ! Require explicit policy for eBGP neighbors
  bgp ebgp-requires-policy

  ! Relax autonomous system path matching for multipath routing
  bgp bestpath as-path multipath-relax
  maximum-paths 3

  ! Create peer-group HOMELAB with remote ASN 64513
  neighbor HOMELAB peer-group
  neighbor HOMELAB remote-as 64513

  ! Add node IPs as neighbors
  neighbor 10.89.0.10 peer-group HOMELAB
  neighbor 10.89.0.11 peer-group HOMELAB

  ! Site-to-site BGP peer (folly udm-pro, iBGP ASN 64512)
  neighbor FOLLY peer-group
  neighbor FOLLY remote-as 64512
  ! Source the session from the LAN router-id, not the WAN/tunnel egress IP,
  ! so packets traverse the SD-WAN and folly recognizes us as neighbor 10.89.0.1
  neighbor FOLLY update-source 10.89.0.1
  neighbor 10.3.0.1 peer-group FOLLY

  ! Apply Policies
  address-family ipv4 unicast
    redistribute connected
    neighbor HOMELAB activate
    neighbor HOMELAB next-hop-self
    neighbor HOMELAB soft-reconfiguration inbound
    neighbor HOMELAB route-map RM-HOMELAB-IN in
    neighbor HOMELAB route-map RM-HOMELAB-OUT out
    neighbor FOLLY activate
    neighbor FOLLY next-hop-self
    neighbor FOLLY soft-reconfiguration inbound
    neighbor FOLLY route-map RM-FOLLY-IN in
    neighbor FOLLY route-map RM-FOLLY-OUT out
  exit-address-family
exit

! VIPs within the service IP pool
ip prefix-list HOMELAB-IN seq 10 permit 10.89.0.0/28 le 32
ip prefix-list HOMELAB-IN seq 20 permit 10.89.0.64/26 le 32
ip prefix-list HOMELAB-IN seq 30 permit 10.101.0.0/20 le 32

! Accept Service IPs from cluster peers
route-map RM-HOMELAB-IN permit 10
  match ip address prefix-list HOMELAB-IN
exit

! Router client network
ip prefix-list HOMELAB-OUT seq 10 permit 192.168.1.0/24 le 32
ip prefix-list HOMELAB-OUT seq 20 permit 10.89.0.0/28 le 32

! Broadcast client network for cluster peers
route-map RM-HOMELAB-OUT permit 10
  match ip address prefix-list HOMELAB-OUT
exit

! Accept folly node subnet + LB VIP pool + pod CIDR from folly udm-pro.
! The LB VIP /32s and pod /24s cross the sites ONLY via this iBGP session —
! OSPF/Site Magic auto-shares just the LAN/node subnets (10.3.0.0/26 ⇄
! 10.89.0.0/28), so the node /26 is learned via both (OSPF wins the RIB; the
! iBGP copy is an inactive recursive-next-hop backup). There is a single
! inter-site data plane (the Site Magic tunnel `wgsts1000`); both the iBGP and
! OSPF next-hops resolve through it, so reachability does NOT depend on which
! protocol wins — it depends on the gateway firewall allowing the full k8s
! address space across the tunnel. NOTE: the offsite console has no custom
! firewall policies (k8s sits in the default Internal zone, whose predefined
! Internal⇄Vpn rules already permit this); folly enforces the same via its
! custom Lab zone in firewall.tf.
ip prefix-list FOLLY-IN seq 10 permit 10.3.0.0/26 le 32
ip prefix-list FOLLY-IN seq 20 permit 10.3.0.64/26 le 32
ip prefix-list FOLLY-IN seq 30 permit 10.100.0.0/20 le 32

route-map RM-FOLLY-IN permit 10
  match ip address prefix-list FOLLY-IN
exit

! Advertise offsite node subnet + LB VIP pool + pod CIDR to folly udm-pro.
! The /32 VIPs and pod /24s are learned from offsite nodes via eBGP; re-advertised
! here so folly can reach offsite Services/pods across the SD-WAN tunnel.
ip prefix-list FOLLY-OUT seq 10 permit 10.89.0.0/28 le 32
ip prefix-list FOLLY-OUT seq 20 permit 10.89.0.64/26 le 32
ip prefix-list FOLLY-OUT seq 30 permit 10.101.0.0/20 le 32

route-map RM-FOLLY-OUT permit 10
  match ip address prefix-list FOLLY-OUT
exit
