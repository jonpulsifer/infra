{{- if .Values.hermes.enabled -}}
# Hermes Agent Deployment — replaces the SandboxTemplate when hermes.enabled=true
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ai-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
# PVC for /opt/data
{{- if .Values.hermes.dataVolume.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-agent.fullname" . }}-hermes-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-agent.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.hermes.dataVolume.storageSize | default "5Gi" }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-agent.selectorLabels" . | nindent 8 }}
    spec:
      hostUsers: false
      automountServiceAccountToken: false
      securityContext:
        # Hermes must run as root (or its own UID 10000). s6-overlay stage2-hook.sh
        # rejects arbitrary UIDs. Run as root here; stage2-hook remaps to hermes
        # UID internally via HERMES_UID/HERMES_GID env vars.
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          # Use native s6-overlay entrypoint (PID 1 = /init, then main-wrapper.sh).
          # main-wrapper.sh handles UID remap, npm install, and drop to hermes user.
          # Bypassing this with a hardcoded command breaks the entire bootstrap.
          args: ["gateway", "run"]
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "1000"
            - name: HERMES_GID
              value: "1000"
            - name: HERMES_TUI_DIR
              value: /opt/hermes/ui-tui
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /opt/hermes/.playwright
            # Inject envSecrets (1Password-backed ExternalSecrets)
            {{- range .Values.envSecrets }}
            - name: {{ .envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-agent.fullname" $ }}-{{ .name }}
                  key: {{ default .envVar .secretKey }}
            {{- end }}
            # Inject hermes-specific literal env vars
            {{- range .Values.hermes.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.hermes.dataVolume.enabled }}
            - name: hermes-data
              mountPath: /opt/data
            {{- end }}
            {{- if .Values.hermes.shmSizeLimit }}
            - name: dshm
              mountPath: /dev/shm
            {{- end }}
      volumes:
        {{- if .Values.hermes.dataVolume.enabled }}
        - name: hermes-data
          persistentVolumeClaim:
            claimName: {{ include "ai-agent.fullname" . }}-hermes-data
        {{- end }}
        {{- if .Values.hermes.shmSizeLimit }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.hermes.shmSizeLimit }}
        {{- end }}
{{- end }}
