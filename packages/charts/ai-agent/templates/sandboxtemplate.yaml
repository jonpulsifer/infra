{{- $persistHome := eq .Values.agentHomeMountPath "/home/agent" -}}
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ include "ai-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-agent.labels" . | nindent 4 }}
spec:
  networkPolicyManagement: Unmanaged
  podTemplate:
    metadata:
      labels:
        {{- include "ai-agent.selectorLabels" . | nindent 8 }}
        sandbox: {{ include "ai-agent.fullname" . }}
      {{- if .Values.configFiles }}
      annotations:
        checksum/config: {{ toYaml .Values.configFiles | sha256sum }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if or .Values.npmTools .Values.configFiles .Values.openclawPlugins }}
      initContainers:
        {{- range .Values.configFiles }}
        - name: install-config-{{ .name }}
          image: {{ $.Values.configInstallImage | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p "$(dirname {{ .mountPath | quote }})"
              cp {{ printf "/config-src/%s" .mountKey | quote }} {{ .mountPath | quote }}
              chmod 0640 {{ .mountPath | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: {{ $.Values.agentHomeMountPath }}
              name: agent-config
            - mountPath: /config-src
              name: config-{{ .name }}
        {{- end }}
        {{- if .Values.npmTools }}
        - name: install-npm-tools
          image: {{ .Values.npmInstallImage | quote }}
          command:
            - sh
            - -c
            {{- if eq .Values.npmToolInstaller "bun" }}
            - bun add --global {{ .Values.npmTools | join " " }}
            {{- else }}
            - npm install -g --prefix /home/agent/.local {{ .Values.npmTools | join " " }}
            {{- end }}
          env:
            - name: HOME
              value: /tmp
            {{- if eq .Values.npmToolInstaller "bun" }}
            - name: BUN_INSTALL
              value: /home/agent/.local
            - name: BUN_INSTALL_CACHE_DIR
              value: /tmp/.bun
            {{- else }}
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            {{- if $persistHome }}
            - mountPath: {{ .Values.agentHomeMountPath }}
              name: agent-config
            {{- else }}
            - mountPath: /home/agent/.local
              name: agent-npm-tools
            {{- end }}
        {{- end }}
        {{- if .Values.openclawPlugins }}
        - name: install-openclaw-plugins
          image: {{ .Values.image | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              {{- range .Values.openclawPlugins }}
              openclaw plugins install --force {{ . | quote }}
              {{- end }}
          env:
            - name: HOME
              value: /home/agent
            - name: OPENCLAW_STATE_DIR
              value: {{ .Values.openclawStateDir }}
            {{- if .Values.workspaceDir }}
            - name: OPENCLAW_WORKSPACE_DIR
              value: {{ .Values.workspaceDir }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: {{ .Values.agentHomeMountPath }}
              name: agent-config
        {{- end }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
              {{- if .Values.securityContext.extraCapabilities }}
              add:
                {{- toYaml .Values.securityContext.extraCapabilities | nindent 16 }}
              {{- end }}
          {{- if .Values.command }}
          command:
            - sh
            - -c
            - {{ .Values.command | quote }}
          {{- end }}
          env:
            - name: HOME
              value: /home/agent
            - name: OPENCLAW_STATE_DIR
              value: {{ .Values.openclawStateDir }}
            - name: OPENCLAW_NO_RESPAWN
              value: "1"
            {{- if .Values.workspaceDir }}
            - name: OPENCLAW_WORKSPACE_DIR
              value: {{ .Values.workspaceDir }}
            {{- end }}
            {{- if .Values.npmTools }}
            - name: PATH
              value: /home/agent/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            {{- end }}
            {{- range .Values.secrets }}
            {{- if .envVar }}
            - name: {{ .envVar }}
              value: {{ .mountPath }}
            {{- end }}
            {{- end }}
            {{- range .Values.envSecrets }}
            - name: {{ .envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-agent.fullname" $ }}-{{ .name }}
                  key: {{ default .envVar .secretKey }}
            {{- end }}
            {{- range .Values.configFiles }}
            {{- if .envVar }}
            - name: {{ .envVar }}
              value: {{ .mountPath }}
            {{- end }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          volumeMounts:
            - mountPath: {{ .Values.agentHomeMountPath }}
              name: agent-config
            {{- if and .Values.npmTools (not $persistHome) }}
            - mountPath: /home/agent/.local
              name: agent-npm-tools
            {{- end }}
            {{- if .Values.workspaceVolume.enabled }}
            - mountPath: /home/agent/workspace
              name: agent-workspace
            {{- end }}
            {{- range .Values.secrets }}
            - mountPath: {{ .mountPath }}
              name: secret-{{ .name }}
              subPath: {{ .mountKey }}
              readOnly: true
            {{- end }}
      volumes:
        {{- if and .Values.npmTools (not $persistHome) }}
        - name: agent-npm-tools
          emptyDir: {}
        {{- end }}
        - name: agent-config
          persistentVolumeClaim:
            claimName: {{ include "ai-agent.fullname" . }}-agent-config
        {{- if .Values.workspaceVolume.enabled }}
        - name: agent-workspace
          persistentVolumeClaim:
            claimName: {{ include "ai-agent.fullname" . }}-agent-workspace
        {{- end }}
        {{- range .Values.secrets }}
        - name: secret-{{ .name }}
          secret:
            secretName: {{ include "ai-agent.fullname" $ }}-{{ .name }}
            items:
              - key: {{ .mountKey }}
                path: {{ .mountKey }}
        {{- end }}
        {{- range .Values.configFiles }}
        - name: config-{{ .name }}
          configMap:
            name: {{ include "ai-agent.fullname" $ }}-{{ .name }}
            items:
              - key: {{ .mountKey }}
                path: {{ .mountKey }}
        {{- end }}
