image: docker.io/jonpulsifer/ai-agents:latest@sha256:dbb6a306b6085d918ce162a87f0a639822c11187b67924e56a4b5c0beea2705c
port: 8080
hostname: ""
storageSize: 2Gi
command: ""
workspaceDir: ""
openclawStateDir: /home/agent/config/.openclaw

# Path where the existing *-agent-config PVC is mounted. Keep the default for
# config-only persistence, or set to /home/agent to persist the whole home dir.
agentHomeMountPath: /home/agent/config

# Dedicated scratch workspace PVC mounted at /home/agent/workspace.
# Leave disabled when the agent keeps its workspace on the config PVC
# (set workspaceDir to a path under /home/agent/config instead).
workspaceVolume:
  enabled: false

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

ingress:
  enabled: true
  forwardedUser: ""
  mode: shared

npmTools: []
# - "@moonpay/cli"
npmInstallImage: node:24-bookworm
npmToolInstaller: npm

# OpenClaw plugins to install into OPENCLAW_STATE_DIR before the gateway starts.
# Use this for plugins that must survive restarts, e.g. chat channel bridges.
openclawPlugins: []
# - "@openclaw/slack@2026.5.20"
# - "@openclaw/discord@2026.5.22"

# securityContext overrides for the agent container.
# allowPrivilegeEscalation: set to true to allow setuid binaries (e.g. sudo).
# extraCapabilities: list of Linux capabilities to add (e.g. NET_RAW for ping).
securityContext:
  allowPrivilegeEscalation: false
  extraCapabilities: []

configInstallImage: busybox:1.38.0

# secrets: config that CONTAINS secret material. Synced from 1Password via an
# ExternalSecret (refreshInterval: 1h keeps it up to date) and mounted read-only.
secrets: []
# - name: config
#   onePasswordItem: my-app-config
#   property: config.json
#   mountPath: /config/config.json
#   mountKey: config.json
#   envVar: CONFIG_PATH

# envSecrets: secret values synced from 1Password via ExternalSecret and
# projected directly into the agent container environment.
envSecrets: []
# - name: op-service-account-token
#   envVar: OP_SERVICE_ACCOUNT_TOKEN
#   onePasswordItem: "Service Account Auth Token: rowbutt"
#   property: credential
#   secretKey: token

# hermes: when enabled, the chart generates a native Kubernetes Deployment
# instead of (or in addition to) the SandboxTemplate. Use this for the Hermes
# Agent which runs as a plain long-running process, not via the sandbox
# controller.
hermes:
  enabled: false
  dataVolume:
    enabled: true
    storageSize: 5Gi
    # storageClassName: defaults to local-path (RWO, single-node). Set to
    # "nfs" (or another RWX-capable class) for multi-node / durable storage.
    # When nil, the rendered PVC omits the field and uses the cluster default.
    storageClassName: null
    accessModes:
      - ReadWriteOnce
  shmSizeLimit: 1Gi
  # Web dashboard (HERMES_DASHBOARD=1) listens on its own port, separate from
  # the gateway's OpenAI-compatible API/health port (.Values.port). Set to ""
  # to disable exposing it (Service/HTTPRoute keep the single API port only).
  dashboardPort: 9119
  env: []
  configFiles: []

# configFiles: non-secret config. Rendered into a ConfigMap and copied into the
# config PVC at startup (writable by the agent). Use this when the config has no
# secrets; deliver any secrets the agent needs separately (e.g. via .env/secrets).
# A checksum annotation rolls the sandbox when content changes.
configFiles: []
# - name: config
#   mountPath: /config/config.json
#   mountKey: config.json
#   envVar: CONFIG_PATH
#   content: |
#     {}
