apiVersion: v1
kind: Endpoints
metadata:
  name: local-node-exporters
  namespace: monitoring
  labels:
    pulsifer.dev/service: node-exporter
subsets:
- addresses:
  - ip: 100.89.114.72
    nodeName: radiopi0
  - ip: 100.72.227.28
    nodeName: blinkypi0
  - ip: 192.168.1.127
    nodeName: screenpi4
  - ip: 100.100.34.88
    nodeName: cloudpi4
  - ip: 100.82.71.4
    nodeName: homepi4
  ports:
  - name: metrics
    port: 9100
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: local-node-exporters
  namespace: monitoring
  labels:
    pulsifer.dev/service: node-exporter
spec:
  type: ExternalName
  externalName: local-node-exporters
  ports:
  - name: metrics
    port: 9100
    protocol: TCP
    targetPort: 9100
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: local-node-exporters
  namespace: monitoring
  labels:
    pulsifer.dev/service: node-exporter
spec:
  endpoints:
  - port: metrics
    interval: 30s
    honorLabels: true
    scheme: http
    path: /metrics
    tlsConfig:
      insecureSkipVerify: true
    relabelings:
      - sourceLabels: [__meta_kubernetes_pod_node_name]
        targetLabel: instance
        regex: (.*)
        replacement: "$1"
        action: replace
  selector:
    matchLabels:
      pulsifer.dev/service: node-exporter
  namespaceSelector:
    matchNames:
    - monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: local-node-exporters
  namespace: monitoring
  labels:
    pulsifer.dev/service: node-exporter
spec:
  groups:
    - name: local-node-exporters
      rules:
        - alert: PrometheusTargetMissing
          expr: up {endpoint="metrics",  namespace="monitoring", service="local-node-exporters"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            message: Prometheus target missing (instance {{ $labels.instance }})
            description: "A Prometheus target has disappeared. An exporter might be crashed.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
