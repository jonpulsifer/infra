apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana.home.pulsifer.ca
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
spec:
  secretName: grafana.home.pulsifer.ca
  dnsNames:
  - grafana.home.pulsifer.ca
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
