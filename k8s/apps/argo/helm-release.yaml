---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: argo
  namespace: argo
spec:
  interval: 24h
  chart:
    spec:
      chart: argo-cd
      version: 5.27.3
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    configs:
      redis.exporter.enabled: true
    server:
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          hajimari.io/icon: sync
          cert-manager.io/cluster-issuer: letsencrypt-production
          nginx.ingress.kubernetes.io/ssl-passthrough: "true"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - &argo "argo.${SECRET_DOMAIN}"
        https: true
        tls:
          - hosts:
              - *argo
            secretName: *argo
