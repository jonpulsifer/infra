---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: argo
  namespace: argo
spec:
  chart:
    spec:
      chart: argo-cd
      version: 5.51.5
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
  values:
    configs:
      redis.exporter.enabled: true
      params:
        server.insecure: true
    server:
      ingress:
        enabled: true
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: sync
          cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
        hosts:
          - &argo "argo.${SECRET_DOMAIN}"
        https: false
        tls:
          - hosts:
              - *argo
            secretName: *argo
