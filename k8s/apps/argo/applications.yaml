---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: request-headers
  namespace: argo
spec:
  project: default
  sources:
    - repoURL: "https://jonpulsifer.github.io/charts"
      chart: nextjs
      targetRevision: 0.0.1
      helm:
        valueFiles:
          - $values/apps/request-headers/helm/values.yaml
    - repoURL: https://github.com/jonpulsifer/ts.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: request-headers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 2
