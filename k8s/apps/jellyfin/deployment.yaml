apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels: &labels
    kubernetes.io/name: jellyfin
    kubernetes.io/part-of: jellyfin
spec:
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
              protocol: TCP
              name: http
            - containerPort: 1900
              protocol: UDP
              name: dlna
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: ["SYS_ADMIN"]
              drop: ["ALL"]
            privileged: false
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
              readOnly: false
            - name: media
              mountPath: /mnt/media
              readOnly: false
            - name: hardware-acceleration
              mountPath: /dev/dri
      volumes:
        - name: jellyfin-config
          emptyDir: {}
        - name: media
          hostPath:
            path: /mnt/media
            type: DirectoryOrCreate
        - name: hardware-acceleration
          hostPath:
            path: /dev/dri
      nodeSelector:
        kubernetes.io/hostname: riptide
