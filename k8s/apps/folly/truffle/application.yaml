apiVersion: custom.sandboxes.x-k8s.io/v1alpha1
kind: Application
metadata:
  name: truffle
  namespace: default
spec:
  image: ghcr.io/jonpulsifer/truffle:latest
  command: "bun run src/index.ts"
  hostname: "truffle.${SECRET_DOMAIN}"
  port: 3000
  database:
    enabled: true
    instances: 1
    size: "1Gi"
    name: "truffle"
    migration:
      enabled: true
      command: "bun run db:migrate && bun run db:seed"
  networkPolicy:
    enabled: false
