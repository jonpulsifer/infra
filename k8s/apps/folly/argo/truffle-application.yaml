---
# CD-friendly single app; avoid duplicating the trufflez ApplicationSet entry or two apps will fight the same objects.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truffle
  namespace: argo
spec:
  project: default
  source:
    repoURL: https://github.com/jonpulsifer/ts.git
    targetRevision: HEAD
    path: apps/truffle/k8s
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 2
