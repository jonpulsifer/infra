apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nextjs
  namespace: argo
spec:
  generators:
    - list:
        elements:
          - app: request-headers
            cluster: in-cluster
            dc: folly
            image: ghcr.io/jonpulsifer/request-headers:latest
          # - app: request-headers
          #   cluster: in-cluster
          #   dc: offsite
          #   namespace: request-headers
          #   image: ghcr.io/jonpulsifer/request-headers:latest
  template:
    metadata:
      name: "{{app}}-{{dc}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/jonpulsifer/ts.git
          targetRevision: HEAD
          path: apps/{{app}}/k8s
          kustomize:
            namespace: "{{app}}"
            images:
              - ghcr.io/jonpulsifer/does-not-exist={{image}}
      destination:
        name: "{{cluster}}"
        namespace: "{{app}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            pod-security.kubernetes.io/enforce: restricted
            pod-security.kubernetes.io/audit: restricted
            pod-security.kubernetes.io/warn: restricted
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 2
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: truffle
  namespace: argo
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: trufflez
            image: ghcr.io/jonpulsifer/truffle:5264cf3c18a0d4b5c172b11bee0e3eab4de71428
            hostname: trufflez.lolwtf.ca
          - name: truffle-canary
            image: ghcr.io/jonpulsifer/truffle:latest
            hostname: truffle-canary.lolwtf.ca
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/jonpulsifer/ts.git
          targetRevision: HEAD
          path: apps/truffle/k8s
          kustomize:
            patches:
              - target:
                  group: custom.sandboxes.x-k8s.io
                  version: v1alpha1
                  kind: Application
                  name: truffle
                patch: |-
                  - op: replace
                    path: /metadata/name
                    value: "{{ .name }}"
                  - op: replace
                    path: /spec/image
                    value: "{{ .image }}"
                  - op: replace
                    path: /spec/hostname
                    value: "{{ .hostname }}"
      destination:
        name: in-cluster
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
        retry:
          limit: 2
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ts-apps
  namespace: argo
spec:
  generators:
    - list:
        elements:
          - app: hub
          - app: slingshot
  template:
    metadata:
      name: "{{app}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/jonpulsifer/ts.git
          targetRevision: HEAD
          path: apps/{{app}}/k8s
      destination:
        name: in-cluster
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
        retry:
          limit: 2
