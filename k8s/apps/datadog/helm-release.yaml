---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: datadog
  namespace: datadog
spec:
  interval: 15m
  chart:
    spec:
      chart: datadog
      version: 2.37.1
      sourceRef:
        kind: HelmRepository
        name: datadog
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    datadog:
      apiKeyExistingSecret: datadog-api-key
      kubelet:
        tlsVerify: false
    agents:
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
