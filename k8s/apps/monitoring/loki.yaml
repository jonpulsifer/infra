---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 24h
  chart:
    spec:
      chart: loki
      version: 3.0.5
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      hosts:
        - host: &loki loki.${SECRET_DOMAIN}
          paths: ["/"]
      tls:
        - secretName: *loki
          hosts:
            - *loki
    config:
      limits_config:
        enforce_metric_name: false
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        max_entries_limit_per_query: 5000
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: longhorn
    serviceMonitor:
      enabled: true
