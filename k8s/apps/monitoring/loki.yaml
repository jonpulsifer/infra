---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 24h
  chart:
    spec:
      chart: ./production/helm/loki
      version: 3.8.0
      sourceRef:
        kind: GitRepository
        name: loki
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    gateway:
      enabled: false
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        hajimari.io/enable: "false"
        hajimari.io/appName: "Loki"
        hajimari.io/group: "Monitoring"
        hajimari.io/icon: math-log
      hosts:
        - &loki loki.${SECRET_DOMAIN}
      tls:
        - secretName: *loki
          hosts:
            - *loki
    loki:
      auth_enabled: false
      storage:
        type: filesystem
      commonConfig:
        replication_factor: 1
    monitoring:
      dashboards:
        enabled: true
      rules:
        enabled: true
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: local-path
    write:
      replicas: 1
    read:
      replicas: 1
    serviceMonitor:
      enabled: true
