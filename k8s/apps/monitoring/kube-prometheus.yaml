---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: prom-stack
  namespace: monitoring
spec:
  interval: 24h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 44.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    defaultRules:
      rules:
        etcd: false
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
    cleanPrometheusOperatorObjectNames: true
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 25Gi
    grafana:
      admin:
        ## Name of the secret. Can be templated.
        existingSecret: grafana-admin-user
        userKey: user
        passwordKey: password
      grafana.ini:
        feature_toggles:
          publicDashboards: true
      deleteDatasources:
        - name: Loki
          orgId: 1
      additionalDataSources:
        - name: Loki
          type: loki
          isDefault: false
          access: proxy
          url: https://loki.${SECRET_DOMAIN}
          orgId: 1
          version: 1
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
          secureJsonData:
            httpHeaderValue1: "1"
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: "default"
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          nginx-ingress:
            gnetId: 9614
            revision: 1
            datasource: Prometheus
          client-dpi:
            gnetId: 11310
            revision: 1
            datasource: Prometheus
          network-sites:
            gnetId: 11311
            revision: 1
            datasource: Prometheus
          usw-insights:
            gnetId: 11312
            revision: 1
            datasource: Prometheus
          usg-insights:
            gnetId: 11313
            revision: 1
            datasource: Prometheus
          uap-insights:
            gnetId: 11314
            revision: 1
            datasource: Prometheus
          client-insights:
            gnetId: 11315
            revision: 1
            datasource: Prometheus
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          hajimari.io/appName: "Grafana"
          hajimari.io/group: "Monitoring"
        hosts:
          - &grafana grafana.${SECRET_DOMAIN}
        tls:
          - secretName: *grafana
            hosts:
              - *grafana
    alertmanager:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          hajimari.io/appName: "Alert Manager"
          hajimari.io/group: "Monitoring"
        hosts:
          - &am am.${SECRET_DOMAIN}
        tls:
          - secretName: *am
            hosts:
              - *am
