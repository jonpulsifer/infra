---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 24h
  chart:
    spec:
      chart: promtail
      version: 6.9.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    config:
      clients:
        - url: https://loki.${SECRET_DOMAIN}/loki/api/v1/push
          tenant_id: "1"
    serviceMonitor:
      enabled: true
