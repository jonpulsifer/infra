---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: atlantis
  namespace: atlantis
spec:
  chart:
    spec:
      chart: atlantis
      version: 4.16.0
      sourceRef:
        kind: HelmRepository
        name: atlantis
        namespace: flux-system
  values:
    orgAllowlist: jonpulsifer
    gitconfigSecretName: atlantis-github
    hidePrevPlanComments: true
    hideUnchangedPlanComments: true
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
        hajimari.io/enable: "true"
        hajimari.io/icon: "robot-industrial-outline"
      hosts:
        - host: &host "atlantis.${SECRET_DOMAIN}"
          paths:
            - path: /*
              pathType: Prefix
      paths:
        - path: /*
          pathType: Prefix
      tls:
        - hosts:
            - *host
          secretName: *host
    serviceMonitor:
      enabled: true
