---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: atlantis
  namespace: atlantis
spec:
  chart:
    spec:
      chart: atlantis
      version: 4.16.0
      sourceRef:
        kind: HelmRepository
        name: atlantis
        namespace: flux-system
  values:
    orgAllowlist: jonpulsifer
    environmentSecrets:
      - name: ATLANTIS_GH_APP_ID
        secretKeyRef:
          name: atlantis-github
          key: github_app_id
      - name: ATLANTIS_GH_APP_SLUG
        secretKeyRef:
          name: atlantis-github
          key: github_app_slug
      - name: ATLANTIS_GH_APP_KEY
        secretKeyRef:
          name: atlantis-github
          key: github_app_private_key
    hidePrevPlanComments: true
    hideUnchangedPlanComments: true
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
        hajimari.io/enable: "true"
        hajimari.io/icon: "robot-industrial-outline"
      host: &host "atlantis.${SECRET_DOMAIN}"
      tls:
        - hosts:
            - *host
          secretName: *host
    serviceMonitor:
      enabled: true
