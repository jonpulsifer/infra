---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: redis
spec:
  chart:
    spec:
      chart: redis
      version: 20.1.5
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    auth:
      enabled: false
      sentinel: true
      existingSecret: redis
      existingSecretPasswordKey: password
    master:
      persistence:
        enabled: false
      automountServiceAccountToken: true
    replica:
      replicaCount: 2
      persistence:
        enabled: false
      automountServiceAccountToken: true
    sentinel:
      enabled: true
      masterSet: redis-master
      getMasterTimeout: 10
      startupProbe:
        failureThreshold: 2
      persistence:
        enabled: false
      masterService:
        enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    rbac:
      create: true
