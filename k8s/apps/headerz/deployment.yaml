---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headerz
  namespace: headerz
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: headerz
      app.kubernetes.io/part-of: headerz
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headerz
        app.kubernetes.io/part-of: headerz
    spec:
      containers:
      - name: headerz
        image: jonpulsifer/headerz:latest
        env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
