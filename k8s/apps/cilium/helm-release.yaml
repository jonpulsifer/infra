---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 24h
  chart:
    spec:
      chart: cilium
      version: 1.13.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    kubeProxyReplacement: strict
    k8sServiceHost: ${API_SERVER_IP}
    k8sServicePort: ${API_SERVER_PORT}
    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList: ${CILIUM_POD_CIDR}
    bpf:
      masquerade: true
    bgpControlPlane:
      enabled: true
    ingressController:
      enabled: true
    operator.prometheus.enabled: true
    prometheus.enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
      metrics:
        enableOpenMetrics: true
        enabled: "{dns,drop,tcp,flow,port-distribution,icmp,httpV2:exemplars=true;labelsContext=source_ip\,source_namespace\,source_workload\,destination_ip\,destination_namespace\,destination_workload\,traffic_direction}"
      ui:
        enabled: true
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-production"
            hajimari.io/enable: "true"
            hajimari.io/icon: "network"
          hosts:
            - &host hubble.${SECRET_DOMAIN}
          tls:
            - hosts:
                - *host
              secretName: *host
