---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: k8s
spec:
  nodeSelector:
    matchLabels:
      bgp-policy: fml
  virtualRouters:
    - localASN: 64512
      exportPodCIDR: true
      neighbors:
        - peerASN: 64512
          peerAddress: 10.2.0.10/32
        - peerASN: 64512
          peerAddress: 10.2.0.11/32
        - peerASN: 64512
          peerAddress: 10.2.0.12/32
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPLoadBalancerIPPool
metadata:
  name: fml
  namespace: kube-system
spec:
  prefix: ${LB_RANGE}
