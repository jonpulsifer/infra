---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: satisfactory
  namespace: satisfactory
spec:
  interval: 24h
  chart:
    spec:
      chart: satisfactory
      version: 0.1.4
      sourceRef:
        kind: HelmRepository
        name: jonpulsifer
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    service:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "satisfactory.${SECRET_DOMAIN}"
