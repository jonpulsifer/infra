---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 24h
  chart:
    spec:
      chart: reloader
      version: 1.0.39
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  values:
    fullnameOverride: reloader
    reloader:
      podMonitor:
        enabled: true
        namespace: reloader
        labels:
          release: prom-stack
        netpol:
          enabled: true
