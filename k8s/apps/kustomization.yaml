---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - arc
  - argo
  # - assemblyline
  - csgo
  - default
  # - dump
  # - falco
  - flux-system
  - headerz
  - postgres
  # - minecraft
  - satisfactory
  - vault
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2beta1
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /spec/interval
        value: 1m0s
      - op: replace
        path: /spec/chart/spec/interval
        value: 5m0s
      - op: replace
        path: /spec/maxHistory
        value: 2
      - op: replace
        path: /spec/install/createNamespace
        value: true
      - op: replace
        path: /spec/install/remediation/retries
        value: 5
      - op: replace
        path: /spec/upgrade/cleanupOnFail
        value: true
      - op: replace
        path: /spec/upgrade/remediation/retries
        value: 5
