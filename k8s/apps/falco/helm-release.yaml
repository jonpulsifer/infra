---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: falco
      version: 3.1.3
      sourceRef:
        kind: HelmRepository
        name: falco
        namespace: flux-system
      interval: 1h0m0s
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    falcosidekick:
      enabled: true
    driver:
      enabled: true
      kind: module
    grpc:
      enabled: true
    grpc_output:
      enabled: true
