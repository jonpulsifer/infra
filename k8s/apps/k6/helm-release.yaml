---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: k6
  namespace: flux-system
spec:
  interval: 24h
  targetNamespace: k6
  chart:
    spec:
      chart: k6-operator
      version: 3.4.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    fullnameOverride: k6
    namespace.create: true
    prometheus.enabled: true
