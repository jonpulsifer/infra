---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: k6
  namespace: k6
spec:
  interval: 24h
  chart:
    spec:
      chart: k6-operator
      install:
        createNamespace: false
      version: 3.4.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    fullnameOverride: k6
    namespace.create: false
    prometheus.enabled: true
