---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: unpoller
  namespace: unpoller
spec:
  interval: 24h
  chart:
    spec:
      chart: unpoller
      version: 0.0.2
      sourceRef:
        kind: HelmRepository
        name: jonpulsifer
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    env:
      UP_UNIFI_DEFAULT_URL: "https://10.2.0.1"
      UP_UNIFI_DEFAULT_USER: "unifipoller"
      UP_UNIFI_DEFAULT_PASS: "unpollerLOL1!"
      UP_PROMETHEUS_DISABLE: false
      UP_INFLUXDB_DISABLE: true
