---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: arc
spec:
  interval: 24h
  chart:
    spec:
      chart: actions-runner-controller
      version: 0.23.3
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    authSecret:
      enabled: true
      name: arc
    ingress:
      enabled: true
      annotations:
        hajimari.io/icon: git
        cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
        # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
        # nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      hosts:
        - host: &gitops "gitops.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      https: true
      tls:
        - hosts:
            - *gitops
          secretName: *gitops
    networkPolicy:
      create: true
    metrics:
      serviceMonitor: true
