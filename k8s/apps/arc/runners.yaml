---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ts
  namespace: arc
spec:
  interval: 24h
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.5.0
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    runnerScaleSetName: home-cluster
    githubConfigUrl: https://github.com/jonpulsifer/ts
    githubConfigSecret: arc
    minRunners: 1
    maxRunners: 2
    template:
      spec:
        containers:
          - name: runner
            image: jonpulsifer/actions-runner:latest
            command: ["/home/runner/run.sh"]

