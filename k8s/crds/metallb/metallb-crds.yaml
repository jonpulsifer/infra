---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: metallb-crds
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/metallb/metallb
  ref:
    branch: main
  ignore: |
    # exclude all
    /*
    # include charts directory
    !/charts/metallb/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: metallb-crds
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/metallb/charts/crds
      version: ''
      sourceRef:
        kind: GitRepository
        name: metallb-crds
        namespace: flux-system
      interval: 10mm
