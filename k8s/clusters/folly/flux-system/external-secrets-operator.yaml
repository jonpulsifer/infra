---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-operator
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s/clusters/folly/external-secrets-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  dependsOn:
    - name: repositories
  # CRDs exist only after this HelmRelease is ready; downstream ks dry-runs need them.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
