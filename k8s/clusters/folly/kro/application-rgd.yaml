---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: application
  namespace: kro-system
spec:
  schema:
    apiVersion: v1alpha1
    kind: Application
    group: custom.agents.x-k8s.io
    spec:
      image: string
      command: "string | default=sleep infinity"
      port: "integer | default=8080"
      replicas: "integer | default=1"
      hostname: string
      certIssuer: "string | default=letsencrypt-production"
      ingress:
        enabled: "boolean | default=true"
      resources:
        requests:
          memory: "string | default=256Mi"
          cpu: "string | default=100m"
        limits:
          memory: "string | default=512Mi"
          cpu: "string | default=500m"
      database:
        enabled: "boolean | default=false"
        instances: "integer | default=1"
        size: "string | default=1Gi"
        name: "string | default=app"
        migration:
          enabled: "boolean | default=false"
          command: "string | default=echo 'no migration configured'"
      networkPolicy:
        enabled: "boolean | default=false"
    status:
      serviceName: ${service.metadata.name}
      serviceEndpoint: ${service.metadata.name}.${service.metadata.namespace}.svc.cluster.local
  resources:
    # --- Namespace (always) ---
    - id: appnamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
            kustomize.toolkit.fluxcd.io/prune: enabled
            pod-security.kubernetes.io/enforce: baseline
            pod-security.kubernetes.io/enforce-version: latest
            pod-security.kubernetes.io/audit: restricted
            pod-security.kubernetes.io/audit-version: latest
            pod-security.kubernetes.io/warn: restricted
            pod-security.kubernetes.io/warn-version: latest

    # --- Deployment (no database) ---
    - id: deployment
      includeWhen:
        - ${!schema.spec.database.enabled}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
                app.kubernetes.io/part-of: ${schema.metadata.name}
            spec:
              automountServiceAccountToken: false
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: app
                  image: ${schema.spec.image}
                  imagePullPolicy: IfNotPresent
                  command:
                    - sh
                    - -c
                    - ${schema.spec.command}
                  ports:
                    - containerPort: ${schema.spec.port}
                      protocol: TCP
                  resources:
                    requests:
                      memory: ${schema.spec.resources.requests.memory}
                      cpu: ${schema.spec.resources.requests.cpu}
                    limits:
                      memory: ${schema.spec.resources.limits.memory}
                      cpu: ${schema.spec.resources.limits.cpu}
                  securityContext:
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsUser: 65532
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL

    # --- Deployment (database, no migration) ---
    - id: deploymentdb
      includeWhen:
        - ${schema.spec.database.enabled}
        - ${!schema.spec.database.migration.enabled}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
          annotations:
            app.kubernetes.io/database: ${database.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
                app.kubernetes.io/part-of: ${schema.metadata.name}
            spec:
              automountServiceAccountToken: false
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: app
                  image: ${schema.spec.image}
                  imagePullPolicy: IfNotPresent
                  command:
                    - sh
                    - -c
                    - ${schema.spec.command}
                  ports:
                    - containerPort: ${schema.spec.port}
                      protocol: TCP
                  env:
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                          name: ${database.metadata.name}-${schema.spec.database.name}
                          key: uri
                  resources:
                    requests:
                      memory: ${schema.spec.resources.requests.memory}
                      cpu: ${schema.spec.resources.requests.cpu}
                    limits:
                      memory: ${schema.spec.resources.limits.memory}
                      cpu: ${schema.spec.resources.limits.cpu}
                  securityContext:
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsUser: 65532
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL

    # --- Deployment (database + migration) ---
    # Depends on the migration Job succeeding before creating/updating
    - id: deploymentmigrate
      includeWhen:
        - ${schema.spec.database.enabled}
        - ${schema.spec.database.migration.enabled}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
          annotations:
            app.kubernetes.io/migration: ${migration.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
                app.kubernetes.io/part-of: ${schema.metadata.name}
            spec:
              automountServiceAccountToken: false
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: app
                  image: ${schema.spec.image}
                  imagePullPolicy: IfNotPresent
                  command:
                    - sh
                    - -c
                    - ${schema.spec.command}
                  ports:
                    - containerPort: ${schema.spec.port}
                      protocol: TCP
                  env:
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                          name: ${database.metadata.name}-${schema.spec.database.name}
                          key: uri
                  resources:
                    requests:
                      memory: ${schema.spec.resources.requests.memory}
                      cpu: ${schema.spec.resources.requests.cpu}
                    limits:
                      memory: ${schema.spec.resources.limits.memory}
                      cpu: ${schema.spec.resources.limits.cpu}
                  securityContext:
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsUser: 65532
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL

    # --- Service (always) ---
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
        spec:
          type: ClusterIP
          selector:
            app.kubernetes.io/name: ${schema.metadata.name}
          ports:
            - name: http
              protocol: TCP
              port: ${schema.spec.port}
              targetPort: ${schema.spec.port}

    # --- Gateway (Cilium, per-app with cert-manager TLS) ---
    - id: gateway
      includeWhen:
        - ${schema.spec.ingress.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: Gateway
        metadata:
          name: ${schema.metadata.name}-gateway
          namespace: ${schema.metadata.name}
          annotations:
            cert-manager.io/cluster-issuer: ${schema.spec.certIssuer}
        spec:
          gatewayClassName: cilium
          listeners:
            - name: http-gateway
              protocol: HTTP
              port: 80
              hostname: ${schema.spec.hostname}
            - name: tls-gateway
              protocol: HTTPS
              port: 443
              hostname: ${schema.spec.hostname}
              tls:
                certificateRefs:
                  - kind: Secret
                    name: ${schema.spec.hostname}

    # --- HTTPRoute ---
    - id: httproute
      includeWhen:
        - ${schema.spec.ingress.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: HTTPRoute
        metadata:
          name: ${schema.metadata.name}-http-route
          namespace: ${schema.metadata.name}
        spec:
          parentRefs:
            - name: ${schema.metadata.name}-gateway
          hostnames:
            - ${schema.spec.hostname}
          rules:
            - backendRefs:
                - name: ${schema.metadata.name}
                  port: ${schema.spec.port}

    # --- CNPG PostgreSQL Cluster ---
    - id: database
      includeWhen:
        - ${schema.spec.database.enabled}
      readyWhen:
        - ${database.status.readyInstances >= 1}
      template:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: ${schema.metadata.name}-db
          namespace: ${schema.metadata.name}
        spec:
          instances: ${schema.spec.database.instances}
          enableSuperuserAccess: false
          storage:
            storageClass: local-path
            size: ${schema.spec.database.size}
          monitoring:
            enablePodMonitor: true
          bootstrap:
            initdb:
              database: ${schema.spec.database.name}
              owner: ${schema.spec.database.name}
              encoding: UTF8
              localeCollate: C
              localeCType: C
              dataChecksums: true

    # --- Migration Job ---
    # Depends on database readyWhen (readyInstances >= 1) via CEL reference.
    # When spec.image changes, kro recreates the Job with the new image,
    # running migrations before the Deployment updates.
    - id: migration
      includeWhen:
        - ${schema.spec.database.enabled}
        - ${schema.spec.database.migration.enabled}
      readyWhen:
        - ${migration.status.succeeded >= 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-migrate
          namespace: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            app.kubernetes.io/part-of: ${schema.metadata.name}
            app.kubernetes.io/component: migration
        spec:
          backoffLimit: 3
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
                app.kubernetes.io/component: migration
            spec:
              restartPolicy: OnFailure
              automountServiceAccountToken: false
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: migrate
                  image: ${schema.spec.image}
                  command:
                    - sh
                    - -c
                    - ${schema.spec.database.migration.command}
                  env:
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                          name: ${database.metadata.name}-${schema.spec.database.name}
                          key: uri
                  securityContext:
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsUser: 65532
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL

    # --- NetworkPolicy ---
    - id: networkpolicy
      includeWhen:
        - ${schema.spec.networkPolicy.enabled}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.name}
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          ingress:
            - ports:
                - port: ${schema.spec.port}
                  protocol: TCP
          egress:
            - {}
