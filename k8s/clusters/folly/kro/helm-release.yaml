---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro-system
spec:
  interval: 24h
  chart:
    spec:
      chart: kro
      version: 0.8.5
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  values: {}
