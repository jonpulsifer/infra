---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: agent
  namespace: kro-system
spec:
  schema:
    apiVersion: v1alpha1
    kind: Agent
    group: custom.sandboxes.x-k8s.io
    spec:
      image: "string | default=docker.io/jonpulsifer/ai-agents:latest"
      port: "integer | default=8080"
      hostname: string
      storageSize: "string | default=2Gi"
      configPath: "string | default=/home/agent/config"
      workspacePath: "string | default=/home/agent/workspace"
      resources:
        requests:
          memory: "string | default=256Mi"
          cpu: "string | default=100m"
        limits:
          memory: "string | default=512Mi"
          cpu: "string | default=500m"
      ingress:
        enabled: "boolean | default=true"
        forwardedUser: "string | default="
        mode: "string | default=shared"
        certIssuer: "string | default=letsencrypt-production"
      command: "string | default="
      secrets:
        - name: string
          onePasswordItem: string
          property: "string | default=config"
          mountPath: string
          mountKey: "string | default=config"
          envVar: "string | default="
    status:
      serviceName: ${service.metadata.name}
      serviceEndpoint: ${service.metadata.name}.${service.metadata.namespace}.svc.cluster.local
      sandboxReady: ${sandboxclaim.status.conditions.exists(c, c.type == "Ready" && c.status == "True")}
      secretsReady: ${schema.spec.secrets.size() == 0 || externalsecret.status.conditions.exists(c, c.type == "Ready" && c.status == "True")}
  resources:
    # --- Basic SandboxTemplate (no secrets) ---
    - id: sandboxtemplate
      includeWhen:
        - ${schema.spec.secrets.size() == 0}
      template:
        apiVersion: extensions.agents.x-k8s.io/v1alpha1
        kind: SandboxTemplate
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          networkPolicyManagement: Unmanaged
          podTemplate:
            metadata:
              labels:
                app: ${schema.metadata.name}
                sandbox: ${schema.metadata.name}
              annotations:
                kro.run/spec-inputs: "${schema.spec.image}-${string(schema.spec.port)}-${schema.spec.resources.requests.memory}-${schema.spec.resources.requests.cpu}-${schema.spec.resources.limits.memory}-${schema.spec.resources.limits.cpu}-${schema.spec.configPath}-${schema.spec.workspacePath}-${schema.spec.storageSize}"
            spec:
              automountServiceAccountToken: false
              securityContext:
                runAsUser: 1337
                runAsGroup: 1337
                fsGroup: 1337
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: agent
                  image: ${schema.spec.image}
                  imagePullPolicy: IfNotPresent
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL
                  ports:
                    - containerPort: ${schema.spec.port}
                  resources:
                    requests:
                      memory: ${schema.spec.resources.requests.memory}
                      cpu: ${schema.spec.resources.requests.cpu}
                    limits:
                      memory: ${schema.spec.resources.limits.memory}
                      cpu: ${schema.spec.resources.limits.cpu}
                  volumeMounts:
                    - mountPath: ${schema.spec.configPath}
                      name: agent-config
                    - mountPath: ${schema.spec.workspacePath}
                      name: agent-workspace
              volumes:
                - name: agent-config
                  ephemeral:
                    volumeClaimTemplate:
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: ${schema.spec.storageSize}
                - name: agent-workspace
                  ephemeral:
                    volumeClaimTemplate:
                      spec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: ${schema.spec.storageSize}

    # --- Config SandboxTemplate (with secrets) ---
    - id: sandboxtemplateconfig
      includeWhen:
        - ${schema.spec.secrets.size() > 0}
      template:
        apiVersion: extensions.agents.x-k8s.io/v1alpha1
        kind: SandboxTemplate
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          networkPolicyManagement: Unmanaged
          podTemplate:
            metadata:
              labels:
                app: ${schema.metadata.name}
                sandbox: ${schema.metadata.name}
              annotations:
                kro.run/spec-inputs: "${schema.spec.image}-${string(schema.spec.port)}-${schema.spec.command}-${schema.spec.resources.requests.memory}-${schema.spec.resources.requests.cpu}-${schema.spec.resources.limits.memory}-${schema.spec.resources.limits.cpu}-${schema.spec.configPath}-${schema.spec.secrets.map(s, s.name + s.mountPath + s.mountKey).join('-')}-${schema.spec.storageSize}"
                kro.run/depends-on-secrets: "${externalsecret.metadata.name}"
            spec:
              automountServiceAccountToken: false
              securityContext:
                runAsUser: 1337
                runAsGroup: 1337
                fsGroup: 1337
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: agent
                  image: ${schema.spec.image}
                  imagePullPolicy: IfNotPresent
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false
                    seccompProfile:
                      type: RuntimeDefault
                    capabilities:
                      drop:
                        - ALL
                  command:
                    - sh
                    - -c
                    - ${schema.spec.command}
                  env: ${schema.spec.secrets.filter(s, s.envVar != "").map(s, {"name": s.envVar, "value": s.mountPath})}
                  ports:
                    - containerPort: ${schema.spec.port}
                  resources:
                    requests:
                      memory: ${schema.spec.resources.requests.memory}
                      cpu: ${schema.spec.resources.requests.cpu}
                    limits:
                      memory: ${schema.spec.resources.limits.memory}
                      cpu: ${schema.spec.resources.limits.cpu}
                  volumeMounts: ${[{"mountPath": schema.spec.configPath, "name": "agent-data"}] + schema.spec.secrets.map(s, {"mountPath": s.mountPath, "name": "secret-" + s.name, "subPath": s.mountKey, "readOnly": true})}
              volumes: ${[{"name": "agent-data", "ephemeral": {"volumeClaimTemplate": {"spec": {"accessModes": ["ReadWriteOnce"], "resources": {"requests": {"storage": schema.spec.storageSize}}}}}}] + schema.spec.secrets.map(s, {"name": "secret-" + s.name, "secret": {"secretName": schema.metadata.name + "-" + s.name, "items": [{"key": s.mountKey, "path": s.mountKey}]}})}

    # --- SandboxClaim (always) ---
    - id: sandboxclaim
      readyWhen:
        - ${sandboxclaim.status.conditions.exists(c, c.type == "Ready" && c.status == "True")}
      template:
        apiVersion: extensions.agents.x-k8s.io/v1alpha1
        kind: SandboxClaim
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          sandboxTemplateRef:
            name: ${schema.metadata.name}

    # --- Service (always) ---
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            app: ${schema.metadata.name}
          ports:
            - name: http
              protocol: TCP
              port: ${schema.spec.port}
              targetPort: ${schema.spec.port}

    # --- ExternalSecrets (1Password, one per secret) ---
    - id: externalsecret
      forEach:
        - secret: ${schema.spec.secrets}
      readyWhen:
        - ${externalsecret.status.conditions.exists(c, c.type == "Ready" && c.status == "True")}
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${schema.metadata.name}-${secret.name}
          namespace: ${schema.metadata.namespace}
        spec:
          refreshInterval: 1h
          secretStoreRef:
            kind: ClusterSecretStore
            name: onepassword-connect
          target:
            name: ${schema.metadata.name}-${secret.name}
            creationPolicy: Owner
          data:
            - secretKey: ${secret.mountKey}
              remoteRef:
                key: ${secret.onePasswordItem}
                property: ${secret.property}

    # --- Standalone Gateway (per-agent, when mode != shared) ---
    - id: gateway
      includeWhen:
        - ${schema.spec.ingress.enabled}
        - ${schema.spec.ingress.mode != "shared"}
      template:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: Gateway
        metadata:
          name: ${schema.metadata.name}-gateway
          namespace: ${schema.metadata.namespace}
          annotations:
            cert-manager.io/cluster-issuer: ${schema.spec.ingress.certIssuer}
        spec:
          gatewayClassName: cilium
          listeners:
            - name: http-gateway
              protocol: HTTP
              port: 80
              hostname: ${schema.spec.hostname}
            - name: tls-gateway
              protocol: HTTPS
              port: 443
              hostname: ${schema.spec.hostname}
              tls:
                certificateRefs:
                  - kind: Secret
                    name: ${schema.spec.hostname}

    # --- HTTPRoute (no auth) ---
    - id: httproute
      includeWhen:
        - ${schema.spec.ingress.enabled}
        - ${schema.spec.ingress.forwardedUser == ""}
      template:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: HTTPRoute
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs:
            - name: '${schema.spec.ingress.mode == "shared" ? "cluster-gateway" : schema.metadata.name + "-gateway"}'
              namespace: '${schema.spec.ingress.mode == "shared" ? "default" : schema.metadata.namespace}'
          hostnames:
            - ${schema.spec.hostname}
          rules:
            - backendRefs:
                - name: ${schema.metadata.name}
                  port: ${schema.spec.port}

    # --- HTTPRoute with auth (X-Forwarded-User) ---
    - id: httprouteauth
      includeWhen:
        - ${schema.spec.ingress.enabled}
        - ${schema.spec.ingress.forwardedUser != ""}
      template:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: HTTPRoute
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          parentRefs:
            - name: '${schema.spec.ingress.mode == "shared" ? "cluster-gateway" : schema.metadata.name + "-gateway"}'
              namespace: '${schema.spec.ingress.mode == "shared" ? "default" : schema.metadata.namespace}'
          hostnames:
            - ${schema.spec.hostname}
          rules:
            - filters:
                - type: RequestHeaderModifier
                  requestHeaderModifier:
                    set:
                      - name: X-Forwarded-User
                        value: ${schema.spec.ingress.forwardedUser}
              backendRefs:
                - name: ${schema.metadata.name}
                  port: ${schema.spec.port}
