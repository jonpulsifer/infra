---
# ESO does not take the 1Password Connect token as a Helm value. The controller reads
# auth from ClusterSecretStore / SecretStore CRs: see cluster-secret-store.yaml, which
# references Secret op-connect-credentials (key: token) in this namespace.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 24h
  chart:
    spec:
      chart: external-secrets
      version: 2.1.3
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
# Connect server uses the same Secret; key 1password-credentials.json only (not the token).
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  interval: 24h
  chart:
    spec:
      chart: connect
      version: 2.4.0
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
  dependsOn:
    - name: external-secrets
  values:
    connect:
      credentialsName: op-connect-credentials
      credentialsKey: 1password-credentials.json
      serviceAccount:
        create: true
    operator:
      create: false
