---
# Installs ESO CRDs + controller. ClusterSecretStore / ExternalSecret live in the sibling
# kustomization (external-secrets) so Flux dry-run runs after CRDs exist.
# 1Password auth: cluster-secret-store.yaml → Secret op-connect-credentials key token.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 24h
  chart:
    spec:
      chart: external-secrets
      version: 2.1.3
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
