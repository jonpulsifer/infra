---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openclaw
  namespace: agents-sandbox
spec:
  networkPolicyManagement: Unmanaged
  podTemplate:
    metadata:
      labels:
        app: openclaw
        sandbox: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openclaw
          image: docker.io/jonpulsifer/ai-agents:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /home/agent/.openclaw/config.json5
          command:
            - openclaw
            - gateway
            - --bind=lan
            - --port
            - "18789"
            - --allow-unconfigured
            - --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /home/agent/.openclaw/config.json5
              name: openclaw-config
              subPath: config.json5
              readOnly: true
            - mountPath: /home/agent/.openclaw/workspace
              name: openclaw-workspace
      volumes:
        - name: openclaw-config
          secret:
            secretName: openclaw-config
            items:
              - key: config.json5
                path: config.json5
        - name: openclaw-workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
