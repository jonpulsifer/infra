---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: agents-sandbox
spec:
  selector:
    app: openclaw
  ports:
    - name: ui
      protocol: TCP
      port: 18789
      targetPort: 18789
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: openclaw-ui
  namespace: agents-sandbox
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: default
  hostnames:
    - "openclaw.lolwtf.ca"
  rules:
    - backendRefs:
        - name: openclaw
          port: 18789
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agents
  namespace: agents-sandbox
spec:
  selector:
    app: ai-agents
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: ai-agents
  namespace: agents-sandbox
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: default
  hostnames:
    - "ai-agents.lolwtf.ca"
  rules:
    - backendRefs:
        - name: ai-agents
          port: 8080
