---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openclaw
  namespace: agents-sandbox
spec:
  podTemplate:
    metadata:
      labels:
        app: openclaw
        sandbox: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: openclaw-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat <<'EOF' > /home/agent/.openclaw/config.json5
              {
                gateway: {
                  controlUi: {
                    allowedOrigins: ["https://openclaw.lolwtf.ca", "http://openclaw.lolwtf.ca"],
                    dangerouslyAllowHostHeaderOriginFallback: true
                  }
                }
              }
              EOF
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /home/agent/.openclaw
              name: openclaw-config
      containers:
        - name: openclaw
          image: docker.io/jonpulsifer/ai-agents:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "changeme"
            - name: OPENCLAW_CONFIG_PATH
              value: /home/agent/.openclaw/config.json5
          command:
            - openclaw
            - gateway
            - --bind=lan
            - --port
            - "18789"
            - --allow-unconfigured
            - --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /home/agent/.openclaw
              name: openclaw-config
            - mountPath: /home/agent/.openclaw/workspace
              name: openclaw-workspace
      volumes:
        - name: openclaw-config
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
        - name: openclaw-workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: ai-agents
  namespace: agents-sandbox
spec:
  podTemplate:
    metadata:
      labels:
        app: ai-agents
        sandbox: ai-agents
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-agents
          image: docker.io/jonpulsifer/ai-agents:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          volumeMounts:
            - mountPath: /home/agent/.openclaw
              name: openclaw-config
            - mountPath: /home/agent/.openclaw/workspace
              name: openclaw-workspace
      volumes:
        - name: openclaw-config
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
        - name: openclaw-workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
