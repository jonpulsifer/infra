---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: agents-sandbox
spec:
  selector:
    app: openclaw
  ports:
    - name: ui
      protocol: TCP
      port: 18789
      targetPort: 18789
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: openclaw-ui
  namespace: agents-sandbox
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: default
  hostnames:
    - "openclaw.lolwtf.ca"
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-User
                value: jonathan
      backendRefs:
        - name: openclaw
          port: 18789
