---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
  namespace: agents-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: openclaw-config
    creationPolicy: Owner
  data:
    - secretKey: config.json5
      remoteRef:
        key: openclaw-config
        property: config.json5
