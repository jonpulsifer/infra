---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: agents-sandbox
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - ipBlock:
            cidr: 10.1.0.0/24
        - ipBlock:
            cidr: 10.2.0.0/24
        - ipBlock:
            cidr: 10.3.0.0/26
        - ipBlock:
            cidr: 10.13.37.0/24
