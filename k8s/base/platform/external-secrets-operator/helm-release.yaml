---
# Installs ESO CRDs + controller. ClusterSecretStore / ExternalSecret live in the sibling
# kustomization (external-secrets) so Flux dry-run runs after CRDs exist.
# 1Password auth: cluster-secret-store.yaml → Secret op-connect-credentials key token.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1m0s
  maxHistory: 2
  chart:
    spec:
      chart: external-secrets
      # Chart index: https://charts.external-secrets.io (2.1.0 = app v2.1.x; 2.1.3 is not published as a chart)
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 5m0s
  values:
    installCRDs: true
