apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: nix-kache
  namespace: nix-kache
  annotations:
    cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
spec:
  gatewayClassName: cilium
  listeners:
    - name: http-gateway
      protocol: HTTP
      port: 80
      hostname: &hostname "nix-kache.${SECRET_DOMAIN}"
    - name: tls-gateway
      protocol: HTTPS
      port: 443
      hostname: *hostname
      tls:
        certificateRefs:
          - kind: Secret
            name: *hostname
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: nix-kache-http-route
  namespace: nix-kache
spec:
  parentRefs:
    - name: nix-kache
  hostnames:
    - "nix-kache.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: nix-serve
          port: 5000
