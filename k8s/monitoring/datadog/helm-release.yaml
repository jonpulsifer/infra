---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: datadog
  namespace: datadog
spec:
  interval: 24h
  chart:
    spec:
      chart: datadog
      version: 3.36.0
      sourceRef:
        kind: HelmRepository
        name: datadog
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    datadog:
      clusterName: lab
      apiKeyExistingSecret: datadog-api-key
      kubelet:
        tlsVerify: false
      processAgent:
        enabled: true
        processCollection: true
      orchestratorExplorer:
        enabled: true
    agents:
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
