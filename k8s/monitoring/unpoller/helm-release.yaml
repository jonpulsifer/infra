---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: unpoller
  namespace: unpoller
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: unifi-poller
      version: 0.0.7
      sourceRef:
        kind: HelmRepository
        name: jonpulsifer
        namespace: flux-system
      interval: 1h0m0s
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    env:
      UP_UNIFI_DEFAULT_URL: https://10.2.0.1
      UP_UNIFI_DEFAULT_USER: unpoller
      UP_UNIFI_DEFAULT_PASS: "unpollerLOL1!"
      UP_PROMETHEUS_DISABLE: false
      UP_PROMETHEUS_NAMESPACE: unpoller
      UP_INFLUXDB_DISABLE: true
      UP_LOKI_URL: https://loki.${SECRET_DOMAIN}
