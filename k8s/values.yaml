  values:
    bgpControlPlane:
      enabled: true
    bpf:
      masquerade: true
    dashboards:
      enabled: true
    hubble:
      enabled: true
      metrics:
        dashboards:
          enabled: true
        enableOpenMetrics: true
        enabled:
        - dns
        - drop
        - tcp
        - flow
        - port-distribution
        - icmp
        - httpV2:exemplars=true
        - labelsContext=source_ip\,source_namespace\,source_workload\,destination_ip\,destination_namespace\,destination_workload\,traffic_direction
        serviceMonitor:
          enabled: true
          labels:
            release: prom-stack
      relay:
        enabled: true
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: prom-stack
      ui:
        enabled: true
        ingress:
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production
            hajimari.io/enable: "true"
            hajimari.io/icon: network
          enabled: true
          hosts:
          - hubble.lolwtf.ca
          tls:
          - hosts:
            - hubble.lolwtf.ca
            secretName: hubble.lolwtf.ca
    ingressController:
      enabled: true
    ipam:
      mode: cluster-pool-v2beta
      operator:
        clusterPoolIPv4PodCIDRList: 10.100.0.0/16
    ipv4NativeRoutingCIDR: 10.0.0.0/6
    k8sServiceHost: 10.3.0.10
    k8sServicePort: "6443"
    kubeProxyReplacement: strict
    operator.prometheus.enabled: true
    prometheus:
      dashboards:
        enabled: true
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prom-stack
    tunnel: disabled
