---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - actions-runner-controller.yaml
  - argo.yaml
  - cilium.yaml
  - datadog.yaml
  - external-dns.yaml
  - falco.yaml
  - grafana.yaml
  - hajimari.yaml
  - hashicorp.yaml
  - ingress-nginx.yaml
  - jetstack.yaml
  - jonpulsifer.yaml
  - kubernetes-dashboard.yaml
  # - longhorn.yaml
  # - metallb.yaml
  - metrics-server.yaml
  - prometheus.yaml
  - stakater.yaml
  - weaveworks.yaml
patches:
  - target:
      group: source.toolkit.fluxcd.io
      version: v1beta2
      kind: HelmRepository
    patch: |-
      - op: replace
        path: /spec/interval
        value: 24h
