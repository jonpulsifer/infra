---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: weaveworks
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.gitops.weave.works
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 24h
  chart:
    spec:
      chart: weave-gitops
      version: 4.0.13
      sourceRef:
        kind: HelmRepository
        name: weaveworks
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    rbac:
      impersonationResourceNames: ["admin"]
    adminUser:
      create: true
      username: admin
    ingress:
      enabled: true
      annotations:
        hajimari.io/icon: git
        cert-manager.io/cluster-issuer: letsencrypt-production
        # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
        # nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      hosts:
        - &gitops "gitops.${SECRET_DOMAIN}"
      https: true
      tls:
        - hosts:
            - *gitops
          secretName: *gitops
    metrics:
      enabled: true
