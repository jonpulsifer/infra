---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: core
  namespace: flux-system
spec:
  interval: 24h
  path: ./k8s/core
  prune: false
  sourceRef:
    kind: GitRepository
    name: infra
  dependsOn:
    - name: charts
    - name: config
    - name: crds
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
