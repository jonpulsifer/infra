---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-system
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s/base/platform/arc-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  dependsOn:
    - name: repositories
  # CRDs exist only after this HelmRelease is ready; runners need them.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: actions-runner-controller
      namespace: arc
