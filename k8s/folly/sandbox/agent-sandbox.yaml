---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox-crds
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s/crds
  prune: false
  sourceRef:
    kind: GitRepository
    name: agent-sandbox
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox-controller
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: agent-sandbox
  dependsOn:
    - name: agent-sandbox-crds
  patches:
    - target:
        kind: Deployment
        name: agent-sandbox-controller
      patch: |
        - op: replace
          path: /spec/template/spec/containers/0/image
          value: registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.2.1
        - op: add
          path: /spec/template/spec/containers/0/args/-
          value: "--extensions"
