---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truffle
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: charts/app
      sourceRef:
        kind: GitRepository
        name: infra
        namespace: flux-system
  values:
    fullnameOverride: truffle
    image: ghcr.io/jonpulsifer/truffle:latest
    command: "bun run src/index.ts"
    hostname: "truffle.${SECRET_DOMAIN}"
    port: 3000
    database:
      enabled: true
      instances: 1
      size: 1Gi
      name: truffle
      migration:
        enabled: true
        command: "bun run db:migrate && bun run db:seed"
