# =============================================================================
# Hermes Agent — ExternalSecrets
# =============================================================================
#
# These ExternalSecrets sync secret values from 1Password into Kubernetes
# secrets that the Hermes Deployment consumes.
#
# 1Password items that MUST exist before these will sync successfully:
#
#   Item: "hermes slack bot token"   (Homelab vault)  — property: "bot-token"
#   Item: "hermes slack app token"   (Homelab vault)  — property: "app-token"
#   Item: "hermes openrouter api key" (Homelab vault) — property: "api-key"
#
# Existing items used (no action needed):
#   - "Service Account Auth Token: rowbutt" (Homelab) — property: "credential"
#   - "rowbutt discord bot token"           (Homelab) — property: "credential"
#   - "rowbutt elevenlabs api key"         (Homelab) — property: "credential"
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-ext-slack-tokens
  namespace: agents-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret-slack-tokens
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: "hermes slack bot token"
        property: bot-token
    - secretKey: app-token
      remoteRef:
        key: "hermes slack app token"
        property: app-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-ext-discord-token
  namespace: agents-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret-discord-token
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: "rowbutt discord bot token"
        property: credential
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-ext-elevenlabs-api-key
  namespace: agents-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret-elevenlabs-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: "rowbutt elevenlabs api key"
        property: credential
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-ext-openrouter-api-key
  namespace: agents-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret-openrouter-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: "hermes openrouter api key"
        property: api-key