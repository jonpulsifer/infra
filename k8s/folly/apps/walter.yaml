---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: walter
  namespace: agents-sandbox
spec:
  interval: 1h
  chart:
    spec:
      chart: charts/ai-agent
      sourceRef:
        kind: GitRepository
        name: infra
        namespace: flux-system
  values:
    image: docker.io/jonpulsifer/ai-agents:latest
    port: 18789
    hostname: walter.lolwtf.ca
    storageSize: 10Gi
    command: "openclaw gateway --bind=lan --port 18789 --allow-unconfigured --verbose"
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 8Gi
        cpu: 4000m
    npmInstallImage: node:24-bookworm
    workspaceDir: /home/agent/config/workspace
    workspaceVolume:
      enabled: false
    npmTools:
      - "@moonpay/cli"
    ingress:
      enabled: true
      mode: shared
      forwardedUser: jonathan
    configFiles:
      - name: config
        mountPath: /home/agent/config/openclaw-config.json5
        mountKey: config.json5
        envVar: OPENCLAW_CONFIG_PATH
        content: |
          {
            gateway: {
              trustedProxies: ["10.3.0.0/24", "10.100.0.0/20"],
              auth: {
                mode: "trusted-proxy",
                trustedProxy: {
                  userHeader: "x-forwarded-user",
                  allowUsers: ["jonathan"]
                }
              },
              controlUi: {
                allowedOrigins: ["https://walter.lolwtf.ca"],
                dangerouslyDisableDeviceAuth: true
              }
            }
          }
