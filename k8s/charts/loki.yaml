---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 24h
  url: https://github.com/grafana/loki
  ref:
    branch: main
  ignore: |
    # exclude all
    /*
    # include assemblyline directory
    !/production/helm/loki
