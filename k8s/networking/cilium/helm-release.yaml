---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 24h
  maxHistory: 2
  chart:
    spec:
      chart: cilium
      version: 1.14.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    autoDirectNodeRoutes: true
    devices: eno+
    kubeProxyReplacement: strict
    k8sServiceHost: ${API_SERVER_IP}
    k8sServicePort: ${API_SERVER_PORT}
    ipam:
      mode: cluster-pool-v2beta
      operator:
        clusterPoolIPv4PodCIDRList: ${CILIUM_POD_CIDR}
    ipv4NativeRoutingCIDR: ${CILIUM_NATIVE_ROUTING_CIDR}
    tunnel: disabled
    enableXTSocketFallback: false
    bpf:
      masquerade: true
    bgpControlPlane:
      enabled: true
    # encryption:
    #   enabled: true
    #   type: wireguard
    ingressController:
      enabled: true
      # loadbalancerMode: shared
      enforceHttps: true
    l7Proxy: true
    loadBalancer.backend: envoy
    operator.prometheus.enabled: true
    dashboards:
      enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prom-stack
      dashboards:
        enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: prom-stack
      metrics:
        serviceMonitor:
          enabled: true
          labels:
            release: prom-stack
        dashboards:
          enabled: true
        enableOpenMetrics: true
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - httpV2:exemplars=true
          - labelsContext=source_ip\,source_namespace\,source_workload\,destination_ip\,destination_namespace\,destination_workload\,traffic_direction
      ui:
        enabled: true
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: ${CERT_CLUSTER_ISSUER}
            hajimari.io/enable: "true"
            hajimari.io/icon: "network"
          hosts:
            - &host hubble.${SECRET_DOMAIN}
          tls:
            - hosts:
                - *host
              secretName: *host
