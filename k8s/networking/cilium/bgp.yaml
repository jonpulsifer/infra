---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: k8s
spec:
  nodeSelector:
    matchLabels:
      bgp-policy: fml
  virtualRouters:
    - localASN: 64512
      exportPodCIDR: true
      neighbors:
        - peerASN: 64512
          peerAddress: ${BGP_ROUTER_IP}
      serviceSelector:
        matchExpressions:
            # announce all services on the node
            - {key: debug, operator: NotIn, values: [lol]}
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: fml
  namespace: kube-system
spec:
  cidrs:
  - cidr: ${LB_RANGE}
  serviceSelector:
    # give all services a load balancer IP
    matchExpressions:
      - {key: debug, operator: NotIn, values: [lol]}
