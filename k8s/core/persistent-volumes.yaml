apiVersion: v1
kind: PersistentVolume
metadata:
  name: 800g2
  labels:
    app.kubernetes.io/name: 800g2
    app.kubernetes.io/part-of: worker-nodes
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local
  local:
    path: /mnt/disks/nodes/800g2
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - 800g2
