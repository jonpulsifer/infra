apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler
spec:
  interval: 24h
  chart:
    spec:
      chart: descheduler
      version: 0.35.1
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    kind: Deployment
    deschedulingInterval: 30m
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 2
      maxNoOfPodsToEvictPerNamespace: 2
      maxNoOfPodsToEvictTotal: 4
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
                minPodAge: 10m
                noEvictionPolicy: Mandatory
                podProtections:
                  defaultDisabled:
                    - FailedBarePods
                  extraEnabled:
                    - PodsWithPVC
            - name: RemoveFailedPods
              args:
                reasons:
                  - Evicted
                  - NodeShutdown
                includingInitContainers: true
                excludeOwnerKinds:
                  - Job
                minPodLifetimeSeconds: 3600
            - name: PodLifeTime
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
                maxPodLifeTimeSeconds: 3600
                states:
                  - Pending
                  - PodInitializing
                  - ContainerCreating
                  - ImagePullBackOff
                  - ErrImagePull
                  - ErrImageNeverPull
                  - CreateContainerConfigError
            - name: RemovePodsHavingTooManyRestarts
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
                podRestartThreshold: 20
                includingInitContainers: true
                states:
                  - CrashLoopBackOff
            - name: RemovePodsViolatingNodeTaints
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
            - name: RemovePodsViolatingNodeAffinity
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingInterPodAntiAffinity
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
            - name: RemoveDuplicates
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
            - name: RemovePodsViolatingTopologySpreadConstraint
              args:
                namespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
                constraints:
                  - DoNotSchedule
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 20
                  memory: 20
                  pods: 20
                targetThresholds:
                  cpu: 70
                  memory: 70
                  pods: 65
                evictionLimits:
                  node: 1
                evictableNamespaces:
                  exclude:
                    - cert-manager
                    - cloudflare
                    - descheduler
                    - external-dns
                    - external-secrets
                    - flux-system
                    - kube-system
                    - local-path-provisioner
                    - monitoring
                    - tailscale
          plugins:
            deschedule:
              enabled:
                - RemoveFailedPods
                - PodLifeTime
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeTaints
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingInterPodAntiAffinity
            balance:
              enabled:
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
    service:
      enabled: true
    serviceMonitor:
      enabled: false
