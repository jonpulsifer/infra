---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sandbox
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s/base/platform/sandbox
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: external-secrets
    - name: config
    - name: agent-sandbox-controller
