---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onepassword-connect
  namespace: flux-system
spec:
  interval: 1h0m0s
  path: ./k8s/base/platform/onepassword-connect
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: repositories
    - name: external-secrets-operator
