---
creation_rules:
  - path_regex: clusters/.*\.sops\.ya?ml
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - age1lpfxcn6qwrgtxzymzcxqu20cppsrhmgcpma59sc8ahq9t0w67d3sj8e3e6
  # Bare NixOS host secrets are decrypted by sops-nix on the host itself.
  # Keep each file scoped to its own SSH-host-derived age recipient.
  - path_regex: nix/secrets/oldschool\.sops\.ya?ml
    key_groups:
      - age:
          - age1lpfxcn6qwrgtxzymzcxqu20cppsrhmgcpma59sc8ahq9t0w67d3sj8e3e6
          # oldschool (ssh-to-age of its ed25519 host key)
          - age1apj76svz7gq7uk9w702fv589s2vcu2vfrayx0uucrkrjwl7xcqaqv6g50c
  - path_regex: nix/secrets/optiplex\.sops\.ya?ml
    key_groups:
