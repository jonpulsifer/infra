          # optiplex (ssh-to-age of its ed25519 host key)
          - age1h834eptxf3k24x2splezey7qwlcmey4hysr3a5eccsnhf5z4r9ts8kw5x9
  - path_regex: nix/secrets/retrofit\.sops\.ya?ml
