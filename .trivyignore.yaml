# Trivy misconfiguration suppressions — documented, intentional risk acceptance.
# Loaded in CI via TRIVY_IGNOREFILE (see .github/workflows/trivy.yml).
# Path globs cover both whole-dir scans (e.g. "pbx/pbx.yaml") and per-app
# matrix scans (e.g. "pbx.yaml"), since scan-ref varies with what changed.
misconfigurations:
  # pbx (Asterisk SIP/PBX) is a telephony workload that legitimately requires:
  #   - host ports for SIP signalling (UDP/TCP 5060/5061) — KSV-0024
  #   - root + a writable runtime for Asterisk state/spool/logs — KSV-0014, KSV-0118
  # Hardening these into non-root / read-only would break call handling, so they
  # are accepted rather than "fixed".
  - id: AVD-KSV-0024
    paths: ["**/pbx.yaml", "pbx.yaml"]
    statement: "Asterisk SIP needs host ports to receive VoIP traffic on the node."
  - id: AVD-KSV-0014
    paths: ["**/pbx.yaml", "pbx.yaml"]
    statement: "Asterisk writes runtime state/spool/logs; read-only rootfs is impractical."
  - id: AVD-KSV-0118
    paths: ["**/pbx.yaml", "pbx.yaml"]
    statement: "Asterisk telephony container runs as root by design."
  # netbench's iperf3 DaemonSet uses hostNetwork on purpose: it binds each node
  # at <node-ip>:5201 on its own VLAN so traffic traverses the real wire / VLAN
  # router / site tunnel rather than the Cilium overlay. That's the whole point
  # of the benchmark, so the hostNetwork finding is accepted. Scoped to this
  # uniquely-named manifest so other hostNetwork DaemonSets still get flagged.
  - id: AVD-KSV-0009
    paths: ["**/iperf3/iperf3-daemonset.yaml", "iperf3-daemonset.yaml"]
    statement: "netbench iperf3 server needs hostNetwork to benchmark per-node VLAN paths."
  # ergodox/Dockerfile builds QMK keyboard firmware interactively/locally, run by
  # hand to compile a .hex file — not a deployed service. Pre-existing, unrelated
  # to the dotfiles/mise migration; only surfaced because that PR was the first to
  # touch other top-level files under dotfiles/, triggering a directory-wide scan.
  - id: DS-0002
    paths: ["**/ergodox/Dockerfile", "ergodox/Dockerfile"]
    statement: "Local QMK firmware build container, not a deployed service; root is fine."
